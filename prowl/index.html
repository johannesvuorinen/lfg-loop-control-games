<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prowl — minimal stealth</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0d12; }
      #app { width: 100vw; height: 100vh; }
      canvas { display: block; }

      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        color: #e6edf3;
      }
      #status {
        position: absolute;
        top: 16px;
        left: 16px;
        font-size: 14px;
        line-height: 1.5;
        text-shadow: 0 1px 2px rgba(0,0,0,0.8);
      }
      #alert {
        position: absolute;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.08em;
        padding: 6px 14px;
        border-radius: 6px;
        opacity: 0;
        transition: opacity 0.15s;
      }
      #alert.suspicious { opacity: 1; color: #ffd866; background: rgba(60,40,0,0.55); }
      #alert.detected   { opacity: 1; color: #ff6b6b; background: rgba(60,0,0,0.6); }

      /* detection meter */
      #meterWrap {
        position: absolute;
        bottom: 22px;
        left: 50%;
        transform: translateX(-50%);
        width: 240px;
        height: 10px;
        border: 1px solid rgba(255,255,255,0.25);
        border-radius: 6px;
        overflow: hidden;
        background: rgba(0,0,0,0.4);
      }
      #meterFill { height: 100%; width: 0%; background: #ffd866; transition: width 0.05s linear; }

      #banner {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 14px;
        background: rgba(5,8,12,0.78);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s;
      }
      #banner.show { opacity: 1; }
      #banner h1 { font-size: 44px; letter-spacing: 0.04em; }
      #banner.win h1 { color: #7ee787; }
      #banner.lose h1 { color: #ff6b6b; }
      #banner p { font-size: 15px; color: #9aa7b4; }
    </style>
    <script type="module" crossorigin src="/assets/index-Dd8JFWlD.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <div id="status"></div>
      <div id="alert"></div>
      <div id="meterWrap"><div id="meterFill"></div></div>
      <div id="banner"><h1></h1><p>Press R or Space to restart</p></div>
    </div>
  </body>
</html>
