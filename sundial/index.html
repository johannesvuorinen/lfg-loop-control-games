<!doctype html>
<html lang="en">
  <head>

    <title>Sundial — a controllable day-night cycle</title>
    <style>
      :root { color-scheme: dark; }

      html, body { width: 100%; height: 100%; overflow: hidden; background: #05060a; }

      #clock { font-size: 40px; font-weight: 700; letter-spacing: 1px; }
      #phase { font-size: 17px; opacity: 0.95; margin-top: 2px; }
      #rate { font-size: 13px; opacity: 0.7; margin-top: 6px; }

      #help {
        position: fixed;
        left: 18px;
        bottom: 16px;
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;

        user-select: none;
        opacity: 0.85;
      }
      #help kbd {
        background: rgba(255, 255, 255, 0.14);
        border: 1px solid rgba(255, 255, 255, 0.25);

      <div id="clock">06:00</div>

    </div>
    <div id="help">
      <kbd>[</kbd> slower / reverse&nbsp;&nbsp;<kbd>]</kbd> faster&nbsp;&nbsp;<kbd>Space</kbd> pause&nbsp;&nbsp;<kbd>0</kbd> reset&nbsp;&nbsp;drag to orbit
