<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Belt</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #05060a;
        font-family: "Courier New", Courier, monospace;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      canvas {
        display: block;
      }
      /* HUD overlay — hand-rolled DOM, layered over the WebGL canvas */
      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        color: #d7e6ff;
        text-shadow: 0 0 6px rgba(120, 180, 255, 0.6);
        user-select: none;
      }
      #hud .top {
        position: absolute;
        top: 16px;
        left: 20px;
        right: 20px;
        display: flex;
        justify-content: space-between;
        font-size: 20px;
        letter-spacing: 2px;
      }
      #hud .lives {
        color: #9fd0ff;
      }
      #center {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 14px;
      }
      #center h1 {
        font-size: 64px;
        letter-spacing: 14px;
        font-weight: 700;
        color: #eaf2ff;
        text-shadow: 0 0 18px rgba(120, 180, 255, 0.8);
      }
      #center p {
        font-size: 18px;
        letter-spacing: 1px;
        color: #93a6c8;
        line-height: 1.7;
      }
      #center .blink {
        animation: blink 1.1s steps(2, start) infinite;
        font-size: 22px;
        color: #bfe0ff;
      }
      @keyframes blink {
        50% {
          opacity: 0.2;
        }
      }
      #center.hidden {
        display: none;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-Cr8u-5hy.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <div class="top">
        <div class="score">SCORE 0</div>
        <div class="wave">WAVE 1</div>
        <div class="lives">&#9650; &#9650; &#9650;</div>
      </div>
      <div id="center">
        <h1>BELT</h1>
        <p>
          ROTATE &larr; &rarr; &nbsp;&middot;&nbsp; THRUST &uarr; &nbsp;&middot;&nbsp; FIRE [SPACE]
          &nbsp;&middot;&nbsp; HYPERSPACE [SHIFT]
        </p>
        <p class="blink">CLICK OR PRESS ENTER TO PLAY</p>
      </div>
    </div>
  </body>
</html>
