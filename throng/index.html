<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Throng — survive the crowd</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a12; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }

      #hud {
        position: fixed;
        top: 12px;
        left: 12px;
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        font-size: 14px;
        line-height: 1.5;
        color: #e6f0ff;
        background: rgba(8, 10, 22, 0.62);
        border: 1px solid rgba(120, 160, 255, 0.35);
        border-radius: 10px;
        padding: 10px 14px;
        pointer-events: none;
        text-shadow: 0 1px 2px #000;
        min-width: 196px;
      }
      #hud .row { display: flex; justify-content: space-between; gap: 18px; }
      #hud .k { color: #8fb6ff; }
      #hud .v { font-variant-numeric: tabular-nums; font-weight: 600; }
      #hud .big { font-size: 17px; }
      #hud .warn { color: #ffd166; }
      #hud .dead { color: #ff6b6b; }

      #help {
        position: fixed;
        bottom: 12px;
        left: 12px;
        font-family: ui-monospace, Menlo, monospace;
        font-size: 12px;
        color: #9fb0d0;
        background: rgba(8, 10, 22, 0.5);
        border-radius: 8px;
        padding: 6px 10px;
        pointer-events: none;
      }
      #tech {
        position: fixed;
        bottom: 12px;
        right: 12px;
        font-family: ui-monospace, Menlo, monospace;
        font-size: 11px;
        color: #6f80a0;
        background: rgba(8, 10, 22, 0.5);
        border-radius: 8px;
        padding: 6px 10px;
        text-align: right;
        pointer-events: none;
        max-width: 320px;
      }
      #banner {
        position: fixed;
        top: 38%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-family: ui-monospace, Menlo, monospace;
        color: #fff;
        text-align: center;
        pointer-events: none;
        text-shadow: 0 2px 8px #000;
        display: none;
      }
      #banner .title { font-size: 40px; font-weight: 800; letter-spacing: 1px; }
      #banner .sub { font-size: 16px; margin-top: 8px; color: #ffd166; }
    </style>
    <script type="module" crossorigin src="./assets/index-DdQ5acmo.js"></script>
  </head>
  <body>
    <div id="app"></div>

    <div id="hud">
      <div class="row big"><span class="k">CROWD</span><span class="v" id="hud-count">0</span></div>
      <div class="row big"><span class="k">SURVIVED</span><span class="v" id="hud-time">0.0s</span></div>
      <div class="row"><span class="k">FPS</span><span class="v" id="hud-fps">0</span></div>
      <div class="row"><span class="k">FRAME</span><span class="v" id="hud-ms">0.0ms</span></div>
      <div class="row"><span class="k">DRAWS</span><span class="v" id="hud-draws">0</span></div>
    </div>

    <div id="help">WASD / arrows to move &nbsp;·&nbsp; weave through the throng, don't get swarmed</div>
    <div id="tech">tech: per-character AnimationMixer · SkeletonUtils.clone(rig) per instance · GLTFLoader(RobotExpressive.glb)</div>
    <div id="banner"><div class="title"></div><div class="sub"></div></div>

  </body>
</html>
