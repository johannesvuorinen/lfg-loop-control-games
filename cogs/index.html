<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cogs — a clockwork puzzle</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath fill='%23d9a441' d='M16 2l2 4 4-1 1 4 4 2-1 4 3 3-3 3 1 4-4 2-1 4-4-1-2 4-2-4-4 1-1-4-4-2 1-4-3-3 3-3-1-4 4-2 1-4 4 1z'/%3E%3Ccircle cx='16' cy='16' r='5' fill='%231a1320'/%3E%3C/svg%3E"
    />
    <style>
      :root {
        --hud-fg: #f4e9d0;
        --hud-accent: #d9a441;
        --hud-bg: rgba(24, 18, 12, 0.78);
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0d0a07;
        font-family: 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif;
        color: var(--hud-fg);
        user-select: none;
        -webkit-user-select: none;
      }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }

      #hud {
        position: fixed;
        top: 16px;
        left: 16px;
        padding: 14px 18px;
        background: var(--hud-bg);
        border: 1px solid rgba(217, 164, 65, 0.35);
        border-radius: 10px;
        backdrop-filter: blur(4px);
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.45);
        max-width: 280px;
        line-height: 1.5;
      }
      #hud h1 {
        margin: 0 0 6px;
        font-size: 20px;
        letter-spacing: 2px;
        color: var(--hud-accent);
        text-transform: uppercase;
      }
      #hud .sub { font-size: 12px; opacity: 0.75; margin-bottom: 10px; }
      .meter {
        height: 10px;
        border-radius: 5px;
        background: rgba(255, 255, 255, 0.12);
        overflow: hidden;
        margin: 6px 0 4px;
      }
      .meter > span {
        display: block;
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--hud-accent), #f6d488);
        transition: width 0.08s linear;
      }
      .row { font-size: 13px; display: flex; justify-content: space-between; }
      .row b { color: var(--hud-accent); font-variant-numeric: tabular-nums; }

      #win {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at center, rgba(20,14,8,0.4), rgba(8,6,4,0.85));
        z-index: 10;
      }
      #win.show { display: flex; animation: fade 0.6s ease; }
      #win .card {
        text-align: center;
        padding: 30px 46px;
        border: 1px solid rgba(217, 164, 65, 0.5);
        border-radius: 14px;
        background: var(--hud-bg);
        box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      }
      #win h2 {
        margin: 0 0 8px;
        font-size: 34px;
        letter-spacing: 3px;
        color: var(--hud-accent);
        text-transform: uppercase;
      }
      #win p { margin: 0; opacity: 0.85; }
      @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

      #hint {
        position: fixed;
        bottom: 18px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 13px;
        padding: 8px 16px;
        background: var(--hud-bg);
        border: 1px solid rgba(217, 164, 65, 0.25);
        border-radius: 20px;
        opacity: 0.9;
      }
      kbd {
        font-family: inherit;
        background: rgba(255,255,255,0.14);
        border: 1px solid rgba(255,255,255,0.25);
        border-bottom-width: 2px;
        border-radius: 4px;
        padding: 1px 6px;
        font-size: 12px;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-DYg8ueIG.js"></script>
  </head>
  <body>
    <div id="app"></div>

    <div id="hud">
      <h1>Cogs</h1>
      <div class="sub">Turn the crank to raise the gate.</div>
      <div class="row"><span>Gate</span><b id="gatePct">0%</b></div>
      <div class="meter"><span id="gateBar"></span></div>
      <div class="row"><span>Crank</span><b id="rpm">0 rpm</b></div>
    </div>

    <div id="hint">
      Hold <kbd>A</kbd>/<kbd>D</kbd> or <kbd>&larr;</kbd>/<kbd>&rarr;</kbd> to crank &nbsp;•&nbsp; drag to orbit
    </div>

    <div id="win">
      <div class="card">
        <h2>Gate Open!</h2>
        <p>The mechanism is fully wound. Well cranked.</p>
      </div>
    </div>

  </body>
</html>
