<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scramble — 3D Obstacle Course</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0e14; }
      #app { width: 100vw; height: 100vh; display: block; }
      canvas { display: block; }

      /* HUD */
      #hud {
        position: fixed;
        top: 14px;
        left: 14px;
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        color: #e8eef7;
        font-size: 15px;
        line-height: 1.5;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
        pointer-events: none;
        user-select: none;
        z-index: 10;
      }
      #hud .row { display: flex; gap: 8px; }
      #hud .label { color: #8aa0bd; }
      #hud .value { color: #fff; font-variant-numeric: tabular-nums; }

      /* Crosshair */
      #crosshair {
        position: fixed;
        top: 50%;
        left: 50%;
        width: 6px;
        height: 6px;
        margin: -3px 0 0 -3px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.85);
        box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.4);
        pointer-events: none;
        z-index: 10;
      }

      /* Start / pause overlay */
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: radial-gradient(ellipse at center, rgba(11, 14, 20, 0.55), rgba(11, 14, 20, 0.92));
        color: #e8eef7;
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        text-align: center;
        z-index: 20;
        cursor: pointer;
      }
      #overlay h1 {
        font-size: 42px;
        letter-spacing: 4px;
        margin-bottom: 10px;
        font-weight: 700;
      }
      #overlay .sub { color: #9fb4d1; font-size: 15px; margin-bottom: 26px; }
      #overlay .keys {
        font-size: 14px;
        color: #c4d2e6;
        line-height: 2;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        padding: 16px 26px;
      }
      #overlay kbd {
        background: #1b2433;
        border: 1px solid #2c3a4f;
        border-bottom-width: 2px;
        border-radius: 5px;
        padding: 2px 7px;
        font-size: 13px;
        color: #fff;
      }
      #overlay .cta { margin-top: 26px; font-size: 16px; color: #7fd1ff; }
      #overlay.hidden { display: none; }

      #toast {
        position: fixed;
        top: 22%;
        left: 50%;
        transform: translateX(-50%);
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        color: #fff;
        font-size: 22px;
        font-weight: 700;
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.9);
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.25s ease;
        z-index: 15;
      }
      #toast.show { opacity: 1; }
    </style>
    <script type="module" crossorigin src="./assets/index-yLAtg6sQ.js"></script>
  </head>
  <body>
    <canvas id="app"></canvas>

    <div id="hud">
      <div class="row"><span class="label">CHECKPOINT</span><span class="value" id="cp">0 / 0</span></div>
      <div class="row"><span class="label">TIME</span><span class="value" id="time">0.00</span></div>
      <div class="row"><span class="label">BEST</span><span class="value" id="best">—</span></div>
    </div>

    <div id="crosshair"></div>
    <div id="toast"></div>

    <div id="overlay">
      <h1>SCRAMBLE</h1>
      <div class="sub">A first-person obstacle-course platformer</div>
      <div class="keys">
        <div><kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> &nbsp;move &nbsp;·&nbsp; <kbd>Mouse</kbd> look</div>
        <div><kbd>Space</kbd> jump &nbsp;·&nbsp; <kbd>Shift</kbd> sprint &nbsp;·&nbsp; <kbd>R</kbd> respawn</div>
        <div>Climb the steps & ramp, slide the ledge, jump the gaps,</div>
        <div>ride the moving platform, reach the <b>goal pad</b>.</div>
      </div>
      <div class="cta">Click to play</div>
    </div>

  </body>
</html>
