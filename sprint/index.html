<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sprint — 3D Endless Runner</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0f1a; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }

      #hud {
        position: fixed; top: 0; left: 0; right: 0;
        display: flex; justify-content: space-between; align-items: flex-start;
        padding: 18px 24px;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        color: #fff; pointer-events: none; user-select: none;
        text-shadow: 0 2px 8px rgba(0,0,0,0.6);
      }
      .hud-box {
        background: rgba(10, 16, 30, 0.45);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 12px; padding: 10px 16px;
        backdrop-filter: blur(6px);
      }
      .hud-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.6; }
      .hud-value { font-size: 28px; font-weight: 700; line-height: 1.1; }
      #coins .hud-value { color: #ffd54a; }
      #speed-tag { font-size: 12px; opacity: 0.7; margin-top: 2px; }

      #overlay {
        position: fixed; inset: 0; display: none;
        flex-direction: column; align-items: center; justify-content: center;
        background: radial-gradient(circle at center, rgba(10,16,30,0.7), rgba(5,8,16,0.92));
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        color: #fff; text-align: center; user-select: none;
      }
      #overlay.show { display: flex; }
      #overlay h1 { font-size: 64px; font-weight: 800; letter-spacing: 2px; margin-bottom: 8px;
        background: linear-gradient(90deg, #ff5a7a, #ffb347); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
      #overlay .stats { font-size: 20px; opacity: 0.9; margin-bottom: 6px; }
      #overlay .stats b { color: #ffd54a; }
      #overlay .hint { margin-top: 22px; font-size: 16px; opacity: 0.7; }
      #overlay .hint kbd {
        background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25);
        border-radius: 6px; padding: 2px 8px; font-family: inherit; font-weight: 600;
      }

      #start-hint {
        position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%);
        font-family: 'Segoe UI', system-ui, sans-serif; color: rgba(255,255,255,0.75);
        font-size: 14px; letter-spacing: 1px; pointer-events: none; user-select: none;
        text-shadow: 0 2px 6px rgba(0,0,0,0.6);
      }
      #start-hint kbd {
        background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.22);
        border-radius: 5px; padding: 1px 7px; margin: 0 2px;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-8JGfJPKy.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <div id="distance" class="hud-box">
        <div class="hud-label">Distance</div>
        <div class="hud-value">0<span style="font-size:16px;opacity:0.7">m</span></div>
      </div>
      <div id="coins" class="hud-box" style="text-align:right">
        <div class="hud-label">Coins</div>
        <div class="hud-value">0</div>
        <div id="speed-tag">x1.0</div>
      </div>
    </div>
    <div id="start-hint">
      <kbd>A</kbd>/<kbd>D</kbd> or <kbd>&larr;</kbd>/<kbd>&rarr;</kbd> lanes &nbsp;·&nbsp; <kbd>Space</kbd> jump
    </div>
    <div id="overlay">
      <h1>GAME OVER</h1>
      <div class="stats">Distance: <b id="final-distance">0</b> m</div>
      <div class="stats">Coins: <b id="final-coins">0</b></div>
      <div class="stats">Score: <b id="final-score">0</b></div>
      <div class="hint">Press <kbd>R</kbd> to run again</div>
    </div>
  </body>
</html>
