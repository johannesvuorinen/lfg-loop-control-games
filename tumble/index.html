<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8" />

    <div id="app">
      <canvas id="scene"></canvas>

      <!-- HUD -->
      <div id="hud">
        <div class="stat">
          <span class="label">DISTANCE</span>
          <span class="value" id="distance">0.0 m</span>

        <div class="stat">
          <span class="label">BEST</span>
          <span class="value" id="best">0.0 m</span>

      <!-- Power / aim indicator -->
      <div id="aim-hint">Drag back, release to launch</div>

      <!-- Start / result overlay -->
      <div id="overlay" class="visible">
        <div class="card">
          <h1>TUMBLE</h1>
          <p class="tagline">Ragdoll launcher</p>
          <p id="result"></p>
          <button id="start-btn">LAUNCH</button>
          <p class="hint">Drag anywhere to aim &amp; set power · release to fling</p>
