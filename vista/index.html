<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vista — a 2D parallax runner</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0b0f1a;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      #app { position: fixed; inset: 0; }
      canvas { display: block; width: 100%; height: 100%; }

      /* HUD */
      #hud {
        position: fixed;
        top: 16px;
        left: 0;
        right: 0;
        display: flex;
        justify-content: space-between;
        padding: 0 24px;
        color: #fff;
        font-weight: 700;
        font-size: 20px;
        letter-spacing: 0.5px;
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.6);
        pointer-events: none;
        user-select: none;
      }
      #hud .pill {
        background: rgba(0, 0, 0, 0.28);
        border-radius: 999px;
        padding: 6px 14px;
        backdrop-filter: blur(4px);
      }

      /* Progress bar showing distance to goal */
      #progress {
        position: fixed;
        bottom: 18px;
        left: 5%;
        width: 90%;
        height: 8px;
        background: rgba(255, 255, 255, 0.18);
        border-radius: 999px;
        overflow: hidden;
        pointer-events: none;
      }
      #progress > #fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #ffd166, #ef476f);
        border-radius: 999px;
        transition: width 0.08s linear;
      }
      #progress > #flag {
        position: absolute;
        top: -6px;
        right: 0;
        font-size: 16px;
      }

      /* Center overlay for start / win / lose */
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #fff;
        text-align: center;
        background: rgba(8, 12, 24, 0.55);
        pointer-events: none;
        user-select: none;
      }
      #overlay.hidden { display: none; }
      #overlay h1 {
        margin: 0 0 8px;
        font-size: 56px;
        letter-spacing: 1px;
        text-shadow: 0 4px 18px rgba(0, 0, 0, 0.7);
      }
      #overlay p { margin: 4px 0; font-size: 20px; opacity: 0.92; }
      #overlay .hint { margin-top: 18px; font-size: 16px; opacity: 0.8; }
    </style>
    <script type="module" crossorigin src="./assets/index-7l-VRToU.js"></script>
  </head>
  <body>
    <div id="app"></div>

    <div id="hud">
      <div class="pill">🪙 <span id="coins">0</span></div>
      <div class="pill"><span id="distance">0</span> m</div>
    </div>

    <div id="progress">
      <div id="fill"></div>
      <div id="flag">🏁</div>
    </div>

    <div id="overlay">
      <h1 id="title">VISTA</h1>
      <p id="subtitle">A 2D parallax runner</p>
      <p class="hint" id="hint">Press SPACE or click to start · jump the gaps & spikes</p>
    </div>

  </body>
</html>
