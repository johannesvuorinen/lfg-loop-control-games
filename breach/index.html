<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BREACH — trigger-volume heist</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #05070d; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }

      /* ---------- HUD ---------- */
      #hud {
        position: fixed; inset: 0; pointer-events: none;
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        color: #cfe9ff; user-select: none;
      }
      #panel {
        position: absolute; top: 16px; left: 16px;
        background: rgba(8, 16, 28, 0.72);
        border: 1px solid rgba(90, 170, 255, 0.35);
        border-radius: 10px; padding: 12px 14px;
        min-width: 230px;
        box-shadow: 0 6px 30px rgba(0, 0, 0, 0.5), inset 0 0 24px rgba(40, 120, 255, 0.08);
        backdrop-filter: blur(4px);
      }
      #panel h1 {
        font-size: 15px; letter-spacing: 3px; font-weight: 700;
        color: #7fd0ff; margin-bottom: 8px;
        text-shadow: 0 0 12px rgba(80, 180, 255, 0.6);
      }
      .row { display: flex; justify-content: space-between; font-size: 12px; line-height: 20px; }
      .row .k { color: #7d93ad; }
      .row .v { color: #e8f4ff; font-weight: 600; }
      .v.good { color: #6dffa6; }
      .v.bad  { color: #ff6b6b; }
      .v.warn { color: #ffd45e; }
      #hint {
        margin-top: 8px; padding-top: 8px;
        border-top: 1px solid rgba(90, 170, 255, 0.2);
        font-size: 11px; color: #8aa0b8; line-height: 16px;
      }
      kbd {
        background: rgba(120, 180, 255, 0.16); border: 1px solid rgba(120, 180, 255, 0.3);
        border-radius: 4px; padding: 0 5px; font-size: 10px; color: #cfe9ff;
      }

      /* ---------- banners ---------- */
      #banner {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        text-align: center; opacity: 0; transition: opacity 0.25s ease;
      }
      #banner.show { opacity: 1; }
      #banner .big { font-size: 46px; font-weight: 800; letter-spacing: 6px; }
      #banner .sub { font-size: 14px; letter-spacing: 2px; margin-top: 6px; color: #9fb6cf; }
      #banner.win .big  { color: #6dffa6; text-shadow: 0 0 26px rgba(80, 255, 160, 0.7); }
      #banner.alarm .big { color: #ff5757; text-shadow: 0 0 26px rgba(255, 60, 60, 0.8); }

      /* full-screen red alarm flash */
      #flash {
        position: absolute; inset: 0; background: #ff2a2a;
        opacity: 0; pointer-events: none; transition: opacity 0.08s linear;
        mix-blend-mode: screen;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-_YEAeOHf.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <div id="panel">
        <h1>BREACH</h1>
        <div class="row"><span class="k">PLATES HELD</span><span class="v" id="hud-plates">0 / 0</span></div>
        <div class="row"><span class="k">GATES OPEN</span><span class="v" id="hud-gates">0 / 0</span></div>
        <div class="row"><span class="k">LASERS</span><span class="v" id="hud-lasers">0</span></div>
        <div class="row"><span class="k">ALARM</span><span class="v good" id="hud-alarm">SECURE</span></div>
        <div class="row"><span class="k">LIVES</span><span class="v" id="hud-lives">3</span></div>
        <div id="hint">
          <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> move &nbsp;·&nbsp; push the crate onto a plate<br/>
          hold plates → open gates → reach the gold vault · avoid red lasers
        </div>
      </div>
      <div id="flash"></div>
      <div id="banner"><div class="big"></div><div class="sub"></div></div>
    </div>
  </body>
</html>
