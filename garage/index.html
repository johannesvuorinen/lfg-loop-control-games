<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Garage — Car Paint Shop</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #0b0d12;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        color: #e8ecf2;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      canvas {
        display: block;
      }

      /* ---- HUD ---- */
      #hud {
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 10;
        max-width: 320px;
        padding: 14px 16px;
        border-radius: 12px;
        background: rgba(16, 20, 28, 0.72);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.45);
        user-select: none;
      }
      #hud h1 {
        margin: 0 0 2px;
        font-size: 17px;
        letter-spacing: 0.5px;
        font-weight: 700;
      }
      #hud .sub {
        margin: 0 0 12px;
        font-size: 11px;
        color: #8b93a3;
      }
      .parts {
        display: grid;
        grid-template-columns: 1fr;
        gap: 6px;
      }
      .part-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 7px 9px;
        border-radius: 8px;
        cursor: pointer;
        border: 1px solid transparent;
        transition: background 0.12s, border-color 0.12s;
      }
      .part-row:hover {
        background: rgba(255, 255, 255, 0.05);
      }
      .part-row.selected {
        background: rgba(86, 130, 255, 0.16);
        border-color: rgba(86, 130, 255, 0.55);
      }
      .swatch {
        width: 20px;
        height: 20px;
        border-radius: 5px;
        border: 1px solid rgba(255, 255, 255, 0.25);
        flex: 0 0 auto;
      }
      .part-key {
        font-size: 11px;
        color: #8b93a3;
        width: 14px;
        text-align: center;
      }
      .part-name {
        font-size: 13px;
        flex: 1;
      }
      .part-color {
        font-size: 11px;
        color: #aab2c2;
      }
      #status {
        margin-top: 12px;
        font-size: 12px;
        line-height: 1.5;
        color: #aab2c2;
      }
      #status b {
        color: #e8ecf2;
      }
      #win {
        margin-top: 10px;
        padding: 9px 11px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 700;
        text-align: center;
        display: none;
      }
      #win.show {
        display: block;
        background: linear-gradient(135deg, #1f8a4c, #2bd17a);
        color: #04140a;
        animation: pop 0.4s ease;
      }
      @keyframes pop {
        0% {
          transform: scale(0.9);
          opacity: 0;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
      .hint {
        margin-top: 12px;
        font-size: 11px;
        color: #6c7484;
        line-height: 1.5;
      }
      kbd {
        display: inline-block;
        padding: 1px 5px;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.14);
        font-size: 10px;
        font-family: inherit;
      }

      /* ---- target scheme panel ---- */
      #target {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 10;
        padding: 12px 14px;
        border-radius: 12px;
        background: rgba(16, 20, 28, 0.72);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.45);
        user-select: none;
      }
      #target h2 {
        margin: 0 0 8px;
        font-size: 12px;
        letter-spacing: 0.5px;
        color: #8b93a3;
        font-weight: 600;
        text-transform: uppercase;
      }
      #target .trow {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 5px;
        font-size: 12px;
      }
      #target .trow .swatch {
        width: 16px;
        height: 16px;
      }
      #target .check {
        margin-left: auto;
        font-size: 12px;
        width: 16px;
        text-align: center;
      }
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        color: #6c7484;
        z-index: 5;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-iqKxSmua.js"></script>
  </head>
  <body>
    <div id="loading">Loading garage…</div>
    <div id="app"></div>

    <div id="hud" style="display: none">
      <h1>🔧 GARAGE</h1>
      <p class="sub">Car paint shop &middot; three.js multi-material</p>

      <div class="parts" id="parts"></div>

      <div id="status">
        Selected: <b id="sel-name">Body</b><br />
        Color: <b id="sel-color">—</b>
      </div>

      <div id="win">🏆 SCHEME MATCHED!</div>

      <p class="hint">
        <kbd>Click</kbd> a car part or press <kbd>1</kbd>–<kbd>4</kbd> to select.
        <kbd>Space</kbd> / click swatch cycles its color.<br />
        Drag to orbit &middot; scroll to zoom.
      </p>
    </div>

    <div id="target" style="display: none">
      <h2>🎯 Target Scheme</h2>
      <div id="target-rows"></div>
    </div>

  </body>
</html>
