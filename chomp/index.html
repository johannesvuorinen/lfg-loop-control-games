<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chomp</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
        font-family: "Courier New", monospace;
        user-select: none;
      }
      #app {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
      }
      canvas {
        display: block;
        touch-action: none;
      }
      /* HUD overlay drawn with plain DOM on top of the WebGL canvas. */
      #hud {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 18px;
        color: #ffd54a;
        font-size: 20px;
        font-weight: bold;
        letter-spacing: 1px;
        text-shadow: 0 0 6px rgba(255, 213, 74, 0.5);
        pointer-events: none;
        z-index: 10;
      }
      #hud .lives {
        color: #ff5a5a;
        text-shadow: 0 0 6px rgba(255, 90, 90, 0.5);
      }
      #banner {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        z-index: 20;
        pointer-events: none;
        text-align: center;
      }
      #banner .card {
        background: rgba(0, 0, 0, 0.72);
        border: 2px solid #ffd54a;
        border-radius: 14px;
        padding: 26px 40px;
        color: #fff;
        box-shadow: 0 0 24px rgba(255, 213, 74, 0.35);
      }
      #banner h1 {
        color: #ffd54a;
        font-size: 40px;
        margin-bottom: 10px;
        letter-spacing: 3px;
      }
      #banner p {
        font-size: 16px;
        line-height: 1.6;
        opacity: 0.9;
      }
      #banner.hidden {
        display: none;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-Bg5awR1L.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <span id="score">SCORE 0</span>
      <span id="pellets">PELLETS 0</span>
      <span class="lives" id="lives">&#10084; &#10084; &#10084;</span>
    </div>
    <div id="banner">
      <div class="card">
        <h1>CHOMP</h1>
        <p>
          Arrow keys / WASD to move &middot; eat every pellet<br />
          Grab a power-pellet to chase the ghosts<br /><br />
          <strong>Click or press a key to start</strong>
        </p>
      </div>
    </div>
  </body>
</html>
