<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lift — freight elevator puzzle</title>
  <style>
    :root {
      --bg: #0e1320;
      --panel: rgba(18, 24, 40, 0.82);
      --stroke: rgba(120, 150, 210, 0.28);
      --text: #e8eefc;
      --muted: #93a3c7;
      --accent: #5cc8ff;
      --good: #46e2a0;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; height: 100%; overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    #app { position: fixed; inset: 0; }
    canvas { display: block; }

    /* ---- HUD ---- */
    #hud {
      position: fixed; top: 16px; left: 16px;
      width: 264px; padding: 14px 16px;
      background: var(--panel);
      border: 1px solid var(--stroke);
      border-radius: 14px;
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
      user-select: none;
    }
    #hud h1 {
      margin: 0 0 2px; font-size: 17px; letter-spacing: 0.5px; font-weight: 700;
    }
    #hud .sub { margin: 0 0 12px; font-size: 11.5px; color: var(--muted); }
    .row { display: flex; justify-content: space-between; align-items: baseline;
      font-size: 12.5px; padding: 3px 0; }
    .row .k { color: var(--muted); }
    .row .v { font-variant-numeric: tabular-nums; font-weight: 600; }
    .v.sel { color: var(--accent); }
    .v.goal { color: var(--good); }
    .bar { height: 7px; border-radius: 4px; margin-top: 8px;
      background: rgba(255,255,255,0.08); overflow: hidden; }
    .bar > span { display: block; height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--good));
      transition: width 0.12s linear; }

    #win {
      margin-top: 12px; padding: 8px 10px; border-radius: 9px; font-size: 13px;
      text-align: center; font-weight: 700; color: #04210f;
      background: var(--good); display: none;
    }
    #win.show { display: block; }

    /* ---- lift control buttons ---- */
    #controls {
      position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 10px; align-items: stretch;
      padding: 10px; background: var(--panel);
      border: 1px solid var(--stroke); border-radius: 14px;
      backdrop-filter: blur(10px); user-select: none;
    }
    .lbtn {
      min-width: 92px; padding: 8px 10px; cursor: pointer;
      border: 1px solid var(--stroke); border-radius: 10px;
      background: rgba(255,255,255,0.04); color: var(--text);
      font: inherit; text-align: center; transition: all .1s;
    }
    .lbtn:hover { background: rgba(255,255,255,0.10); }
    .lbtn.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset; }
    .lbtn .key { display: inline-block; min-width: 16px; padding: 0 4px; margin-right: 6px;
      border-radius: 5px; background: rgba(255,255,255,0.12);
      font-size: 11px; font-weight: 700; }
    .lbtn .nm { font-size: 12.5px; font-weight: 600; }
    .lbtn .ds { display: block; font-size: 10.5px; color: var(--muted); margin-top: 2px; }
    .swatch { display:inline-block; width:9px; height:9px; border-radius:3px;
      margin-right:5px; vertical-align: middle; }

    #hint { position: fixed; bottom: 18px; right: 18px;
      font-size: 11.5px; color: var(--muted); text-align: right; line-height: 1.5;
      user-select: none; }
    kbd { background: rgba(255,255,255,0.1); border-radius: 4px; padding: 1px 5px;
      font-size: 11px; }
  </style>
  <script type="module" crossorigin src="./assets/index-CIAYIWkW.js"></script>
</head>
<body>
  <div id="app"></div>

  <div id="hud">
    <h1>LIFT</h1>
    <p class="sub">Drive the lifts. Ferry the crate to the goal shelf.</p>
    <div class="row"><span class="k">Selected lift</span><span class="v sel" id="hud-sel">—</span></div>
    <div class="row"><span class="k">Crate height</span><span class="v" id="hud-h">0.0 m</span></div>
    <div class="row"><span class="k">Goal height</span><span class="v goal" id="hud-goal">0.0 m</span></div>
    <div class="bar"><span id="hud-bar"></span></div>
    <div id="win">CRATE DELIVERED ✓</div>
  </div>

  <div id="controls"><!-- buttons injected by main.js --></div>

  <div id="hint">
    <div><kbd>1</kbd>…<kbd>4</kbd> select lift &nbsp; <kbd>↑</kbd>/<kbd>↓</kbd> or <kbd>W</kbd>/<kbd>S</kbd> drive</div>
    <div>Position lifts cycle floors · conveyor lifts run while held · <kbd>R</kbd> reset</div>
  </div>

</body>
</html>
