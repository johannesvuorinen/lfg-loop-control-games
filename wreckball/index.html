<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>WRECKBALL</title>
  <style>
    :root {
      --panel: rgba(18, 22, 30, 0.82);
      --accent: #ffb703;
      --text: #e8edf4;
      --muted: #9aa3b2;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%; overflow: hidden;
      background: #10131a; color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      -webkit-user-select: none; user-select: none; touch-action: none;
    }
    #scene { display: block; width: 100vw; height: 100vh; }

    /* HUD (top-left) */
    #hud {
      position: fixed; top: 14px; left: 14px; z-index: 10;
      background: var(--panel); backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
      padding: 12px 14px; min-width: 210px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.35);
      font-variant-numeric: tabular-nums;
    }
    .hud-row { display: flex; justify-content: space-between; align-items: baseline; gap: 16px; padding: 2px 0; font-size: 14px; }
    .hud-row span { color: var(--muted); }
    .hud-row b { color: var(--text); font-size: 15px; }
    .hud-title { font-weight: 700; font-size: 15px; color: var(--accent) !important; justify-content: flex-start; margin-bottom: 6px; letter-spacing: 0.3px; }

    /* Instruction strip (bottom) */
    #tip {
      position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%); z-index: 10;
      background: var(--panel); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px; padding: 8px 16px; font-size: 13px; color: var(--muted);
      white-space: nowrap;
    }
    #tip b { color: var(--text); }

    /* Aim indicator (follows drag) */
    #aim {
      position: fixed; z-index: 9; width: 120px; height: 14px;
      pointer-events: none; opacity: 0; transition: opacity 0.08s;
      transform-origin: 0 50%;
    }
    #aim .track {
      position: absolute; left: 0; top: 0; width: 100%; height: 100%;
      background: rgba(255,255,255,0.12); border-radius: 999px; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.18);
    }
    #aim-fill { position: absolute; left: 0; top: 0; height: 100%; width: 0%; background: #06d6a0; border-radius: 999px; }
    #aim .arrow {
      position: absolute; right: -10px; top: 50%; transform: translateY(-50%);
      width: 0; height: 0; border-top: 9px solid transparent; border-bottom: 9px solid transparent;
      border-left: 12px solid var(--text);
    }

    /* Overlay (start / win / lose) */
    #overlay {
      position: fixed; inset: 0; z-index: 20; display: none;
      align-items: center; justify-content: center;
      background: rgba(8, 10, 14, 0.6); backdrop-filter: blur(3px);
    }
    .card {
      background: var(--panel); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px; padding: 32px 36px; text-align: center; max-width: 440px;
      box-shadow: 0 16px 50px rgba(0,0,0,0.5);
    }
    .card h1 { margin: 0 0 10px; font-size: 34px; letter-spacing: 1px; color: var(--accent); }
    .card p { margin: 8px 0; color: var(--text); line-height: 1.5; }
    .card .lead { font-size: 17px; }
    .card .hint { color: var(--muted); font-size: 14px; }
    .card button {
      margin-top: 18px; padding: 12px 28px; font-size: 16px; font-weight: 600;
      color: #10131a; background: var(--accent); border: none; border-radius: 999px;
      cursor: pointer; transition: transform 0.08s, filter 0.12s;
    }
    .card button:hover { filter: brightness(1.08); }
    .card button:active { transform: scale(0.97); }
  </style>

  <!-- Vendored ES modules so the game runs on static hosting with no build step.
       The bare specifiers below resolve to the files in ./vendor.
       three.module.js internally imports "./three.core.js" (relative), which
       resolves naturally next to it — so it does NOT need an importmap entry. -->
  <script type="importmap">
  {
    "imports": {
      "three": "./vendor/three.module.js",
      "cannon-es": "./vendor/cannon-es.js"
    }
  }
  </script>
</head>
<body>
  <canvas id="scene"></canvas>

  <div id="hud"></div>
  <div id="tip">Drag to aim &amp; power, then <b>release</b> to swing</div>

  <div id="aim">
    <div class="track"><div id="aim-fill"></div></div>
    <div class="arrow"></div>
  </div>

  <div id="overlay"></div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
