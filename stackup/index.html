<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Stack Up</title>
    <style>
      :root {
        color-scheme: dark;
        --ink: #f5f7ff;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0d1326; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; width: 100%; height: 100%; touch-action: none; }

      /* ---- HUD ---- */
      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        font-family: ui-rounded, "SF Pro Rounded", "Segoe UI", system-ui, sans-serif;
        color: var(--ink);
        -webkit-user-select: none;
        user-select: none;
      }
      #score {
        position: absolute;
        top: 28px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 92px;
        font-weight: 800;
        line-height: 1;
        letter-spacing: -2px;
        text-shadow: 0 6px 24px rgba(0, 0, 0, 0.55);
      }
      #hint {
        position: absolute;
        top: 138px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 17px;
        font-weight: 600;
        letter-spacing: 0.4px;
        opacity: 0.82;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        white-space: nowrap;
      }
      #perfect {
        position: absolute;
        top: 150px;
        left: 50%;
        transform: translateX(-50%) scale(0.6);
        font-size: 30px;
        font-weight: 800;
        letter-spacing: 1px;
        color: #ffe27a;
        text-shadow: 0 2px 14px rgba(0, 0, 0, 0.6);
        opacity: 0;
        transition: opacity 0.12s ease, transform 0.18s cubic-bezier(0.2, 1.6, 0.4, 1);
      }
      #perfect.show { opacity: 1; transform: translateX(-50%) scale(1); }

      /* ---- result overlay ---- */
      #overlay {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: radial-gradient(ellipse at center, rgba(8, 12, 28, 0.35), rgba(8, 12, 28, 0.78));
        opacity: 0;
        transition: opacity 0.35s ease;
      }
      #overlay.show { opacity: 1; }
      #overlay h1 {
        font-size: 64px;
        font-weight: 800;
        letter-spacing: -1px;
        text-shadow: 0 6px 24px rgba(0, 0, 0, 0.6);
      }
      #overlay .big {
        font-size: 26px;
        font-weight: 700;
      }
      #overlay .big b { color: #ffe27a; }
      #overlay .restart {
        margin-top: 8px;
        font-size: 18px;
        font-weight: 600;
        opacity: 0.85;
        padding: 12px 22px;
        border: 2px solid rgba(245, 247, 255, 0.45);
        border-radius: 999px;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-DxcnDBaO.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <div id="score">0</div>
      <div id="hint">Click / Tap / Space to drop</div>
      <div id="perfect">PERFECT!</div>
      <div id="overlay">
        <h1>Game Over</h1>
        <div class="big">Tower: <b id="finalScore">0</b> blocks</div>
        <div class="restart">Press R or tap to restart</div>
      </div>
    </div>
  </body>
</html>
