<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Curio — Artifact Collection</title>
    <style>
      :root {
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0b0c10;
        color: #f5f3ee;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      canvas {
        display: block;
      }

      /* ---- HUD ---- */
      #hud {
        position: fixed;
        top: 18px;
        left: 18px;
        padding: 12px 16px;
        background: rgba(18, 19, 24, 0.55);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 12px;
        pointer-events: none;
        user-select: none;
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.35);
      }
      #hud .title {
        font-size: 13px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        opacity: 0.65;
      }
      #hud .count {
        font-size: 30px;
        font-weight: 700;
        margin-top: 2px;
        font-variant-numeric: tabular-nums;
      }
      #hint {
        position: fixed;
        bottom: 18px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 13px;
        opacity: 0.7;
        background: rgba(18, 19, 24, 0.5);
        padding: 8px 14px;
        border-radius: 999px;
        pointer-events: none;
        user-select: none;
      }

      /* ---- Win banner ---- */
      #win {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 18px;
        background: radial-gradient(
          ellipse at center,
          rgba(11, 12, 16, 0.45) 0%,
          rgba(11, 12, 16, 0.82) 70%
        );
        backdrop-filter: blur(3px);
      }
      #win.show {
        display: flex;
        animation: fade 0.6s ease;
      }
      @keyframes fade {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      #win h1 {
        margin: 0;
        font-size: 46px;
        letter-spacing: 0.04em;
        text-shadow: 0 2px 30px rgba(255, 211, 120, 0.5);
      }
      #win p {
        margin: 0;
        opacity: 0.8;
      }
      #restart {
        pointer-events: auto;
        font: inherit;
        font-size: 15px;
        font-weight: 600;
        color: #1a1206;
        background: linear-gradient(180deg, #ffd87a, #f3b13c);
        border: none;
        padding: 12px 26px;
        border-radius: 999px;
        cursor: pointer;
        box-shadow: 0 8px 24px rgba(243, 177, 60, 0.4);
        transition: transform 0.12s ease;
      }
      #restart:hover {
        transform: translateY(-2px);
      }

      /* ---- Loading overlay ---- */
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 14px;
        background: #0b0c10;
        z-index: 10;
        transition: opacity 0.5s ease;
      }
      #loading.hide {
        opacity: 0;
        pointer-events: none;
      }
      .spinner {
        width: 38px;
        height: 38px;
        border: 3px solid rgba(255, 255, 255, 0.15);
        border-top-color: #f3b13c;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      #loading .lbl {
        font-size: 13px;
        letter-spacing: 0.12em;
        opacity: 0.6;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-C9NExd17.js"></script>
  </head>
  <body>
    <div id="app"></div>

    <div id="hud">
      <div class="title">Curios Collected</div>
      <div class="count"><span id="count">0</span> / <span id="total">0</span></div>
    </div>

    <div id="hint">Drag to orbit · scroll to zoom · click a curio to collect it</div>

    <div id="win">
      <h1>Collection Complete</h1>
      <p>You recovered every curio in the room.</p>
      <button id="restart">Play again (R)</button>
    </div>

    <div id="loading">
      <div class="spinner"></div>
      <div class="lbl">Loading curios…</div>
    </div>

  </body>
</html>
