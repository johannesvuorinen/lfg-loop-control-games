<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bastion — Lane Tower Defense</title>
    <style>
      :root {
        --hud-bg: rgba(8, 14, 26, 0.82);
        --hud-border: rgba(90, 140, 220, 0.45);
        --accent: #5ad1ff;
        --ok: #6ee7a0;
        --warn: #ffcf5a;
        --bad: #ff6b6b;
        --text: #e8f0ff;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #05070d;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        color: var(--text);
        user-select: none;
      }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }

      #hud {
        position: fixed;
        top: 12px;
        left: 12px;
        right: 12px;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
        pointer-events: none;
        z-index: 10;
      }
      .stats {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .chip {
        background: var(--hud-bg);
        border: 1px solid var(--hud-border);
        border-radius: 10px;
        padding: 8px 14px;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.3px;
        backdrop-filter: blur(6px);
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.4);
      }
      .chip .label { opacity: 0.6; font-weight: 500; margin-right: 6px; font-size: 12px; text-transform: uppercase; }
      .chip .val { font-size: 17px; }
      #money .val { color: var(--warn); }
      #lives .val { color: var(--bad); }
      #wave .val { color: var(--accent); }

      #selector {
        display: flex;
        flex-direction: column;
        gap: 8px;
        pointer-events: auto;
      }
      .towerbtn {
        background: var(--hud-bg);
        border: 1px solid var(--hud-border);
        border-radius: 10px;
        padding: 10px 14px;
        color: var(--text);
        cursor: pointer;
        text-align: left;
        min-width: 168px;
        transition: border-color 0.12s, transform 0.06s;
        backdrop-filter: blur(6px);
      }
      .towerbtn:hover { border-color: var(--accent); }
      .towerbtn.active { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(90, 209, 255, 0.4); }
      .towerbtn .tname { font-weight: 700; font-size: 14px; }
      .towerbtn .tcost { float: right; color: var(--warn); font-weight: 700; }
      .towerbtn .tdesc { font-size: 11px; opacity: 0.65; margin-top: 3px; }

      #hint {
        position: fixed;
        bottom: 14px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--hud-bg);
        border: 1px solid var(--hud-border);
        border-radius: 10px;
        padding: 7px 16px;
        font-size: 13px;
        opacity: 0.85;
        pointer-events: none;
        z-index: 10;
      }

      #banner {
        position: fixed;
        inset: 0;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: rgba(3, 6, 12, 0.72);
        backdrop-filter: blur(3px);
        z-index: 20;
      }
      #banner.show { display: flex; }
      #banner .title {
        font-size: 64px;
        font-weight: 800;
        letter-spacing: 2px;
        text-shadow: 0 6px 30px rgba(0, 0, 0, 0.6);
      }
      #banner.win .title { color: var(--ok); }
      #banner.lose .title { color: var(--bad); }
      #banner .sub { font-size: 18px; opacity: 0.8; }
      #restart {
        margin-top: 8px;
        background: var(--accent);
        color: #03121c;
        border: none;
        border-radius: 12px;
        padding: 14px 34px;
        font-size: 18px;
        font-weight: 700;
        cursor: pointer;
        pointer-events: auto;
        box-shadow: 0 8px 26px rgba(90, 209, 255, 0.45);
      }
      #restart:hover { filter: brightness(1.08); }
    </style>
    <script type="module" crossorigin src="./assets/index-CvvyccSe.js"></script>
  </head>
  <body>
    <div id="app"></div>

    <div id="hud">
      <div class="stats">
        <div class="chip" id="money"><span class="label">Money</span><span class="val">0</span></div>
        <div class="chip" id="lives"><span class="label">Lives</span><span class="val">0</span></div>
        <div class="chip" id="wave"><span class="label">Wave</span><span class="val">0</span></div>
      </div>
      <div id="selector"></div>
    </div>

    <div id="hint">Click a buildable pad to place the selected tower</div>

    <div id="banner">
      <div class="title"></div>
      <div class="sub"></div>
      <button id="restart">Play Again</button>
    </div>

  </body>
</html>
