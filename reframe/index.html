<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reframe</title>
    <style>
      :root {
        --accent: #5fd0ff;
        --win: #7CFFB2;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #0a0e16;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #eef3fb;
      }
      #app { position: fixed; inset: 0; }
      canvas { display: block; width: 100%; height: 100%; }

      /* HUD overlay */
      #hud {
        position: fixed;
        top: 18px;
        left: 18px;
        z-index: 10;
        pointer-events: none;
        user-select: none;
      }
      #pkgCount {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 1.5px;
        padding: 10px 16px;
        background: rgba(12, 18, 30, 0.62);
        border: 1px solid rgba(95, 208, 255, 0.35);
        border-radius: 10px;
        backdrop-filter: blur(6px);
        text-shadow: 0 1px 3px rgba(0,0,0,0.6);
      }
      #pkgCount b { color: var(--accent); }
      #hint {
        margin-top: 10px;
        font-size: 13px;
        opacity: 0.78;
        padding-left: 4px;
        max-width: 320px;
        line-height: 1.4;
      }

      /* Win banner */
      #win {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: none;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        pointer-events: none;
        background: radial-gradient(ellipse at center, rgba(8,14,22,0.0) 0%, rgba(8,14,22,0.55) 75%);
      }
      #win.show { display: flex; animation: pop 0.5s ease-out; }
      #win .banner {
        font-size: 64px;
        font-weight: 900;
        letter-spacing: 6px;
        color: var(--win);
        text-shadow: 0 0 28px rgba(124,255,178,0.55), 0 3px 8px rgba(0,0,0,0.6);
      }
      #win .sub {
        margin-top: 12px;
        font-size: 18px;
        letter-spacing: 2px;
        opacity: 0.9;
      }
      @keyframes pop {
        0%   { transform: scale(0.7); opacity: 0; }
        60%  { transform: scale(1.06); opacity: 1; }
        100% { transform: scale(1); opacity: 1; }
      }
    </style>
    <script type="module" crossorigin src="./assets/index-CqbhLfBh.js"></script>
  </head>
  <body>
    <div id="app"></div>

    <div id="hud">
      <div id="pkgCount">PACKAGES&nbsp;&nbsp;<b id="pkgNum">0</b> / 4</div>
      <div id="hint">WASD / Arrows steer in WORLD space. The disc spins — you ride it. Collect all 4 packages.</div>
    </div>

    <div id="win">
      <div class="banner">REFRAMED!</div>
      <div class="sub">All packages delivered</div>
    </div>

  </body>
</html>
