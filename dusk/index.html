<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dusk — beat-the-nightfall beacon run</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #05060c;
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        color: #eef;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      canvas {
        display: block;
      }

      /* ---- HUD ---- */
      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 10;
        user-select: none;
      }
      .panel {
        position: absolute;
        top: 14px;
        left: 14px;
        padding: 10px 14px;
        background: rgba(8, 10, 22, 0.55);
        border: 1px solid rgba(140, 170, 255, 0.25);
        border-radius: 10px;
        backdrop-filter: blur(6px);
        line-height: 1.5;
        font-size: 13px;
        min-width: 210px;
      }
      .row {
        display: flex;
        justify-content: space-between;
        gap: 18px;
      }
      .label {
        color: #9fb0d8;
      }
      .val {
        font-weight: 600;
      }
      #phase {
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      /* day-progress bar */
      #clockbar {
        position: relative;
        margin-top: 8px;
        height: 7px;
        border-radius: 4px;
        overflow: hidden;
        background: linear-gradient(
          90deg,
          #ffd27a 0%,
          #ff9a4d 38%,
          #c4623f 60%,
          #3b3f86 80%,
          #0c1030 100%
        );
      }
      #clockfill {
        position: absolute;
        top: 0;
        bottom: 0;
        right: 0;
        background: rgba(4, 5, 14, 0.78);
        width: 0%;
      }
      .hint {
        margin-top: 8px;
        font-size: 11px;
        color: #7f8fc0;
      }

      /* center banner for win / lose */
      #banner {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        padding: 26px 40px;
        border-radius: 16px;
        background: rgba(6, 8, 20, 0.72);
        border: 1px solid rgba(160, 180, 255, 0.3);
        backdrop-filter: blur(8px);
        display: none;
      }
      #banner.show {
        display: block;
      }
      #banner h1 {
        font-size: 34px;
        letter-spacing: 0.04em;
        margin-bottom: 8px;
      }
      #banner.win h1 {
        color: #ffe39a;
        text-shadow: 0 0 22px rgba(255, 200, 110, 0.7);
      }
      #banner.lose h1 {
        color: #8fa6ff;
        text-shadow: 0 0 22px rgba(110, 140, 255, 0.6);
      }
      #banner p {
        font-size: 14px;
        color: #aab6e0;
      }
    </style>
    <script type="module" crossorigin src="/assets/index-DYdvSrXs.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <div class="panel">
        <div class="row">
          <span class="label">Time of day</span><span class="val" id="phase">—</span>
        </div>
        <div id="clockbar"><div id="clockfill"></div></div>
        <div class="row" style="margin-top: 8px">
          <span class="label">Beacons lit</span><span class="val" id="beacons">0 / 0</span>
        </div>
        <div class="hint">WASD / arrows to move · touch a pillar to light it · R to restart</div>
      </div>
      <div id="banner">
        <h1 id="banner-title">—</h1>
        <p id="banner-sub">Press R to run again</p>
      </div>
    </div>
  </body>
</html>
