<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pick — find the target</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><circle cx='8' cy='8' r='5' fill='none' stroke='%2337e0e0' stroke-width='2'/></svg>"
    />
    <style>
      :root {
        color-scheme: dark;
        --hud-fg: #f2f4f8;
        --hud-bg: rgba(14, 18, 28, 0.72);
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; overflow: hidden; background: #0b0e16; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }

      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        color: var(--hud-fg);
      }
      .panel {
        position: absolute;
        background: var(--hud-bg);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        padding: 10px 14px;
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.35);
      }
      #target { top: 16px; left: 50%; transform: translateX(-50%); text-align: center; min-width: 260px; }
      #target .label { font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.6; }
      #target .prompt { font-size: 20px; font-weight: 650; margin-top: 2px; }
      #target .prompt .swatch {
        display: inline-block; width: 14px; height: 14px; border-radius: 4px;
        vertical-align: -1px; margin-right: 6px; border: 1px solid rgba(255,255,255,0.35);
      }

      #stats { top: 16px; left: 16px; display: flex; gap: 18px; }
      #stats .stat .k { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.55; }
      #stats .stat .v { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }

      #timer { top: 16px; right: 16px; text-align: right; }
      #timer .k { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.55; }
      #timer .v { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
      #timer.low .v { color: #ff6b6b; }

      #toast {
        left: 50%; bottom: 64px; transform: translateX(-50%);
        font-size: 18px; font-weight: 650; opacity: 0; transition: opacity 0.18s ease;
        padding: 8px 16px;
      }
      #toast.show { opacity: 1; }
      #toast.good { color: #7CFFB2; }
      #toast.bad { color: #ff7b7b; }

      #hint { left: 50%; bottom: 16px; transform: translateX(-50%); font-size: 13px; opacity: 0.65; }

      #over {
        inset: 0; display: none; place-items: center; pointer-events: auto;
        background: rgba(7, 9, 14, 0.78); backdrop-filter: blur(3px);
      }
      #over.show { display: grid; }
      #over .card {
        background: var(--hud-bg); border: 1px solid rgba(255,255,255,0.1);
        border-radius: 16px; padding: 28px 36px; text-align: center; min-width: 280px;
      }
      #over h1 { margin: 0 0 6px; font-size: 28px; }
      #over .final { font-size: 16px; opacity: 0.8; margin-bottom: 18px; }
      #over button {
        font: inherit; font-weight: 650; font-size: 15px; color: #0b0e16;
        background: #7CFFB2; border: 0; border-radius: 10px; padding: 10px 22px; cursor: pointer;
      }
      #over button:hover { filter: brightness(1.06); }
    </style>
    <script type="module" crossorigin src="./assets/index-D29_UT1Z.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <div id="stats" class="panel">
        <div class="stat"><div class="k">Score</div><div class="v" id="score">0</div></div>
        <div class="stat"><div class="k">Streak</div><div class="v" id="streak">0</div></div>
      </div>
      <div id="target" class="panel">
        <div class="label">Find</div>
        <div class="prompt" id="prompt">—</div>
      </div>
      <div id="timer" class="panel"><div class="k">Time</div><div class="v" id="time">30.0</div></div>
      <div id="toast" class="panel"></div>
      <div id="hint" class="panel">Hover to outline · Click to select</div>
      <div id="over">
        <div class="card">
          <h1>Time!</h1>
          <div class="final" id="final">Score 0</div>
          <button id="again">Play again</button>
        </div>
      </div>
    </div>
  </body>
</html>
