<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crown — Checkers</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; background: #0d1117; overflow: hidden; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }
      #hud {
        position: fixed; top: 14px; left: 14px; z-index: 10;
        color: #e6edf3; background: rgba(13,17,23,0.72);
        border: 1px solid rgba(240,246,252,0.14); border-radius: 10px;
        padding: 12px 16px; min-width: 220px; backdrop-filter: blur(6px);
        pointer-events: none; user-select: none; line-height: 1.5;
      }
      #hud .title { font-weight: 700; font-size: 18px; letter-spacing: 0.5px; }
      #hud .turn { margin-top: 6px; font-size: 15px; }
      #hud .counts { margin-top: 4px; font-size: 13px; opacity: 0.9; }
      #hud .msg { margin-top: 8px; font-size: 13px; min-height: 18px; color: #7ee787; }
      #hud .dot { display: inline-block; width: 11px; height: 11px; border-radius: 50%; margin-right: 6px; vertical-align: -1px; }
      #hint { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); z-index: 10;
        color: #8b949e; font-size: 12px; background: rgba(13,17,23,0.6); padding: 6px 12px; border-radius: 8px; pointer-events: none; }
    </style>
    <script type="module" crossorigin src="./assets/index-D-iOjJsx.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <div class="title">👑 CROWN</div>
      <div class="turn" id="hud-turn"></div>
      <div class="counts" id="hud-counts"></div>
      <div class="msg" id="hud-msg"></div>
    </div>
    <div id="hint">Click a red piece, then a highlighted square. AI plays black.</div>
  </body>
</html>
