<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Star Sweeper</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #05060f;
        font-family: 'Courier New', monospace;
        user-select: none;
        -webkit-user-select: none;
      }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }

      /* HUD */
      #hud {
        position: fixed;
        top: 0; left: 0; right: 0;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        padding: 16px 22px;
        pointer-events: none;
        z-index: 10;
        color: #d8e4ff;
        text-shadow: 0 0 8px rgba(90,150,255,0.6);
      }
      #hud .stat { font-size: 20px; letter-spacing: 1px; }
      #hud .stat b { color: #7fd9ff; font-size: 24px; }
      #lives { color: #ff6b8a; }

      /* Game over overlay */
      #overlay {
        position: fixed;
        inset: 0;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        z-index: 20;
        background: rgba(5,6,15,0.72);
        color: #e8efff;
        text-align: center;
      }
      #overlay.show { display: flex; }
      #overlay h1 {
        font-size: 64px;
        letter-spacing: 6px;
        color: #ff6b8a;
        text-shadow: 0 0 22px rgba(255,80,120,0.8);
      }
      #overlay .final { font-size: 26px; color: #7fd9ff; }
      #overlay .hint { font-size: 18px; opacity: 0.85; }
      #overlay .hint b { color: #ffe27f; }

      /* Title / start banner */
      #banner {
        position: fixed;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        z-index: 15;
        color: #e8efff;
        text-align: center;
        pointer-events: none;
      }
      #banner h1 {
        font-size: 56px;
        letter-spacing: 8px;
        color: #7fd9ff;
        text-shadow: 0 0 24px rgba(90,200,255,0.8);
      }
      #banner p { margin-top: 14px; font-size: 18px; opacity: 0.85; }
      #banner.hide { display: none; }
    </style>
    <script type="module" crossorigin src="./assets/index-CpPlxmcP.js"></script>
  </head>
  <body>
    <div id="app"></div>

    <div id="hud">
      <div class="stat">SCORE <b id="score">0</b></div>
      <div class="stat" id="lives-wrap">LIVES <b id="lives">3</b></div>
    </div>

    <div id="banner">
      <h1>STAR SWEEPER</h1>
      <p>&larr; &rarr; / A D to move &nbsp;&middot;&nbsp; SPACE / click to fire</p>
      <p>Press any key to start</p>
    </div>

    <div id="overlay">
      <h1>GAME OVER</h1>
      <div class="final">FINAL SCORE <span id="final-score">0</span></div>
      <div class="hint">Press <b>R</b> to restart</div>
    </div>

  </body>
</html>
