<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hue — color match (three.js control)</title>
    <style>
      html, body { margin: 0; height: 100%; background: #14151a; overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }

      /* HUD overlay */
      #hud {
        position: fixed; left: 0; right: 0; top: 0; pointer-events: none;
        display: flex; justify-content: space-between; align-items: flex-start;
        padding: 18px 22px; color: #f2f3f7;
      }
      #hud .panel {
        background: rgba(20,21,26,0.72); border: 1px solid rgba(255,255,255,0.10);
        border-radius: 12px; padding: 12px 16px; backdrop-filter: blur(6px);
      }
      #score { font-size: 28px; font-weight: 700; letter-spacing: 0.5px; }
      #score small { font-size: 13px; font-weight: 500; opacity: 0.7; }
      #closeness { margin-top: 6px; font-size: 13px; opacity: 0.85; }
      #bar { width: 180px; height: 8px; border-radius: 5px; margin-top: 6px;
        background: rgba(255,255,255,0.12); overflow: hidden; }
      #bar > i { display: block; height: 100%; width: 0%; background: #5ad17a;
        transition: width 0.12s linear, background 0.12s linear; }

      #targetWrap { display: flex; align-items: center; gap: 12px; }
      #targetSwatch { width: 64px; height: 64px; border-radius: 12px;
        border: 2px solid rgba(255,255,255,0.55); box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
      #targetMeta { font-size: 12px; line-height: 1.5; opacity: 0.9; }
      #targetMeta b { font-size: 13px; }

      #banner {
        position: fixed; left: 50%; top: 50%; transform: translate(-50%,-50%);
        font-size: 40px; font-weight: 800; color: #fff; text-shadow: 0 2px 18px rgba(0,0,0,0.6);
        opacity: 0; transition: opacity 0.25s; pointer-events: none; text-align: center;
      }
      #banner.show { opacity: 1; }
    </style>
    <script type="module" crossorigin src="./assets/index-Bvd-KHPi.js"></script>
  </head>
  <body>
    <div id="app"></div>

    <div id="hud">
      <div class="panel">
        <div id="score">0 <small>/ <span id="goal">8</span> matches</small></div>
        <div id="closeness">closeness <span id="closenessPct">0%</span></div>
        <div id="bar"><i id="barFill"></i></div>
      </div>
      <div class="panel" id="targetWrap">
        <div id="targetSwatch" style="background:#888"></div>
        <div id="targetMeta">
          <b>target</b><br />
          <span id="targetHex">#888888</span><br />
          <span id="targetHsv">h - s - v -</span>
        </div>
      </div>
    </div>

    <div id="banner"></div>

  </body>
</html>
