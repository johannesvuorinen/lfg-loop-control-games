<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Horde — wave survival</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0e14; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }

      /* HUD */
      #hud {
        position: fixed;
        left: 16px;
        top: 14px;
        font: 600 15px/1.4 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: #e7ecf3;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
        pointer-events: none;
        user-select: none;
      }
      #hud .big { font-size: 26px; letter-spacing: 0.5px; }
      #hud .sub { opacity: 0.75; font-weight: 500; font-size: 13px; margin-top: 2px; }
      #hud .accent { color: #ff5a6e; }

      #help {
        position: fixed;
        right: 16px;
        bottom: 14px;
        font: 500 12px/1.5 system-ui, sans-serif;
        color: #9aa6b8;
        text-align: right;
        pointer-events: none;
        user-select: none;
      }
      kbd {
        background: #1b2230;
        border: 1px solid #2c3647;
        border-bottom-width: 2px;
        border-radius: 4px;
        padding: 1px 6px;
        color: #cdd6e4;
        font-family: ui-monospace, monospace;
        font-size: 11px;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-DHkMzoVO.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <div class="big">Wave <span id="wave">1</span></div>
      <div class="sub">Enemies alive: <span id="alive">0</span> · Killed: <span id="killed">0</span></div>
      <div class="sub">HP <span id="php">100</span> · <span class="accent" id="status">FIGHT</span></div>
    </div>
    <div id="help">
      <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> move &nbsp;·&nbsp;
      <kbd>Space</kbd> / click — shoot
    </div>
  </body>
</html>
