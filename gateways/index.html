<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gateways</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a12; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; width: 100%; height: 100%; }

      /* HUD overlay */
      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: #e8f0ff;
        user-select: none;
      }
      #level-label {
        position: absolute;
        top: 22px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 26px;
        font-weight: 700;
        letter-spacing: 2px;
        text-shadow: 0 2px 12px rgba(0,0,0,0.8);
        background: rgba(12, 16, 30, 0.55);
        padding: 8px 22px;
        border-radius: 999px;
        border: 1px solid rgba(120, 160, 255, 0.35);
      }
      #hint {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 14px;
        opacity: 0.75;
        text-shadow: 0 2px 8px rgba(0,0,0,0.8);
      }
      #banner {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.8);
        font-size: 64px;
        font-weight: 800;
        letter-spacing: 4px;
        color: #7CFFB2;
        text-shadow: 0 0 30px rgba(124,255,178,0.6), 0 4px 20px rgba(0,0,0,0.8);
        opacity: 0;
        transition: opacity 0.5s ease, transform 0.5s ease;
      }
      #banner.show {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
      #flash {
        position: absolute;
        inset: 0;
        background: #ffffff;
        opacity: 0;
        transition: opacity 0.35s ease;
      }
      #flash.on { opacity: 0.55; }
    </style>
    <script type="module" crossorigin src="./assets/index-D_dufxcK.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <div id="level-label">LEVEL 1 / 3</div>
      <div id="hint">WASD / Arrow keys to move the ball to the glowing EXIT</div>
      <div id="banner"></div>
      <div id="flash"></div>
    </div>
  </body>
</html>
