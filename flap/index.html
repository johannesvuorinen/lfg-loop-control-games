<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flap</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #4ec0ca; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }

      /* ---- HUD (plain DOM over the WebGL canvas) ---- */
      #hud {
        position: fixed; inset: 0; pointer-events: none;
        font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
        color: #fff; text-align: center;
        -webkit-user-select: none; user-select: none;
      }
      #score {
        position: absolute; top: 6%; left: 50%; transform: translateX(-50%);
        font-size: 72px; font-weight: 800;
        text-shadow: 0 4px 0 #2c3e50, 3px 0 0 #2c3e50, -3px 0 0 #2c3e50, 0 -2px 0 #2c3e50;
        letter-spacing: 2px;
      }
      #banner {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        display: flex; flex-direction: column; align-items: center; gap: 14px;
      }
      #banner h1 {
        font-size: 56px; font-weight: 800; color: #ffd23f;
        text-shadow: 0 4px 0 #2c3e50, 3px 0 0 #2c3e50, -3px 0 0 #2c3e50;
      }
      #banner .sub { font-size: 22px; font-weight: 600; text-shadow: 0 2px 0 #2c3e50; }
      #banner .best { font-size: 20px; font-weight: 600; color: #fff; opacity: .95; text-shadow: 0 2px 0 #2c3e50; }
      .hidden { display: none !important; }
      #hint {
        position: absolute; bottom: 8%; left: 50%; transform: translateX(-50%);
        font-size: 18px; font-weight: 600; opacity: .9; text-shadow: 0 2px 0 #2c3e50;
        animation: pulse 1.2s ease-in-out infinite;
      }
      @keyframes pulse { 0%,100% { opacity: .45; } 50% { opacity: 1; } }
    </style>
    <script type="module" crossorigin src="./assets/index-Cc0yK5ry.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <div id="score">0</div>
      <div id="banner" class="hidden">
        <h1 id="banner-title">FLAP</h1>
        <div class="sub" id="banner-sub">tap / click / space</div>
        <div class="best" id="banner-best"></div>
      </div>
      <div id="hint">tap / click / space to flap</div>
    </div>
  </body>
</html>
