<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ferry — moving-platform platformer</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #0b0f1a; }
      #app { width: 100vw; height: 100vh; display: block; }
      #hud {
        position: fixed; top: 12px; left: 12px; z-index: 10;
        font: 13px/1.4 ui-monospace, Menlo, monospace; color: #cfe3ff;
        background: rgba(10,16,30,0.55); padding: 10px 12px; border-radius: 8px;
        border: 1px solid rgba(120,160,255,0.25); pointer-events: none;
        text-shadow: 0 1px 2px #000;
      }
      #hud b { color: #8fd0ff; }
      #banner {
        position: fixed; inset: 0; display: none; place-items: center; z-index: 20;
        font: 700 48px/1 ui-sans-serif, system-ui, sans-serif; color: #fff;
        text-shadow: 0 4px 24px #2bd, 0 0 40px #2bd; pointer-events: none;
      }
      #banner.show { display: grid; }
    </style>
    <script type="module" crossorigin src="./assets/index-BbERSYKZ.js"></script>
  </head>
  <body>
    <canvas id="app"></canvas>
    <div id="hud">
      <div><b>FERRY</b> — ride the platforms to the goal</div>
      <div>WASD move · SPACE jump · R reset</div>
      <div id="stat"></div>
    </div>
    <div id="banner">YOU MADE IT 🏁</div>
  </body>
</html>
