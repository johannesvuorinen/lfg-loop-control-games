<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glyph — three.js control</title>
    <style>
      :root {
        --bg: #0b0e1a;
        --fg: #e8ecf8;
        --accent: #5eead4;
        --accent-dim: #2dd4bf;
        --done: #4ade80;
        --bad: #f87171;
        --panel: rgba(16, 20, 38, 0.72);
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); }
      body {
        font-family: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
        color: var(--fg);
        -webkit-font-smoothing: antialiased;
      }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }

      /* ---------- HUD ---------- */
      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 22px 26px;
      }
      .row { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }

      .panel {
        background: var(--panel);
        border: 1px solid rgba(94, 234, 212, 0.22);
        border-radius: 14px;
        padding: 14px 18px;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      #title { font-size: 13px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--accent); font-weight: 700; }
      #sub { font-size: 11px; letter-spacing: 0.06em; opacity: 0.62; margin-top: 4px; }

      #target-wrap { text-align: right; }
      #target-label { font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; opacity: 0.6; margin-bottom: 7px; }
      #target {
        display: flex; gap: 8px; justify-content: flex-end;
        font-size: 30px; font-weight: 800; letter-spacing: 0.04em;
      }
      #target .ch {
        min-width: 34px; text-align: center;
        padding: 2px 8px; border-radius: 9px;
        border: 1px solid rgba(94, 234, 212, 0.25);
        color: var(--fg); opacity: 0.5; transition: all 0.18s ease;
      }
      #target .ch.next { opacity: 1; color: #061018; background: var(--accent); border-color: var(--accent); box-shadow: 0 0 22px rgba(94,234,212,0.55); transform: translateY(-2px); }
      #target .ch.done { opacity: 1; color: var(--done); border-color: rgba(74,222,128,0.5); }

      #stats { display: flex; gap: 26px; align-items: baseline; }
      .stat { text-align: center; }
      .stat .v { font-size: 26px; font-weight: 800; color: var(--accent); }
      .stat .k { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.6; }

      #hint { font-size: 12px; opacity: 0.66; letter-spacing: 0.04em; }
      #hint b { color: var(--accent); font-weight: 700; }

      #flash {
        position: fixed; inset: 0; pointer-events: none;
        display: flex; align-items: center; justify-content: center;
        font-size: 64px; font-weight: 900; letter-spacing: 0.05em;
        opacity: 0; transition: opacity 0.12s ease;
        text-shadow: 0 4px 30px rgba(0,0,0,0.6);
      }
      #flash.show { opacity: 1; }

      #win {
        position: fixed; inset: 0; pointer-events: none;
        display: flex; align-items: center; justify-content: center;
        flex-direction: column; gap: 10px;
        background: radial-gradient(ellipse at center, rgba(11,14,26,0.0), rgba(11,14,26,0.72));
        opacity: 0; transition: opacity 0.5s ease;
      }
      #win.show { opacity: 1; }
      #win .big { font-size: 56px; font-weight: 900; color: var(--done); letter-spacing: 0.04em; }
      #win .small { font-size: 14px; opacity: 0.8; letter-spacing: 0.1em; }
    </style>
    <script type="module" crossorigin src="./assets/index-D8EvkixV.js"></script>
  </head>
  <body>
    <div id="app"></div>

    <div id="hud">
      <div class="row">
        <div class="panel">
          <div id="title">Glyph</div>
          <div id="sub">three.js control · collect letters in order</div>
        </div>
        <div class="panel" id="target-wrap">
          <div id="target-label">Spell the word</div>
          <div id="target"></div>
        </div>
      </div>

      <div class="row" style="align-items: flex-end;">
        <div class="panel">
          <div id="hint">Move: <b>WASD</b> / <b>Arrows</b> &nbsp;·&nbsp; Up/Down: <b>Q</b>/<b>E</b> &nbsp;·&nbsp; touch the glowing letter</div>
        </div>
        <div class="panel" id="stats">
          <div class="stat"><div class="v" id="score">0</div><div class="k">Score</div></div>
          <div class="stat"><div class="v" id="progress">0/0</div><div class="k">Letters</div></div>
        </div>
      </div>
    </div>

    <div id="flash"></div>
    <div id="win">
      <div class="big" id="win-word">SOLVED</div>
      <div class="small">All glyphs collected · next word loading…</div>
    </div>

  </body>
</html>
