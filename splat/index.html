<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SPLAT — Paintball Gallery</title>
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
    #scene { display: block; width: 100vw; height: 100vh; cursor: none; touch-action: none; }

    /* ---- Crosshair ---- */
    #crosshair {
      position: fixed; left: 50%; top: 50%;
      width: 34px; height: 34px;
      margin-left: -17px; margin-top: -17px;
      pointer-events: none; z-index: 20;
      transition: transform 0.05s ease-out;
    }
    #crosshair.fire { transform: scale(0.7); }

    /* ---- HUD ---- */
    #hud {
      position: fixed; inset: 0; pointer-events: none; z-index: 10;
      color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    }
    .hud-top {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 18px 22px;
    }
    .stat-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.65; font-weight: 600; }
    .stat-value { font-size: 34px; font-weight: 800; line-height: 1; margin-top: 2px; font-variant-numeric: tabular-nums; }
    #combo-wrap { text-align: center; opacity: 0; transition: opacity 0.2s; }
    #combo-wrap.show { opacity: 1; }
    #combo { font-size: 28px; font-weight: 900; }
    #score-wrap { text-align: right; }

    /* ---- Color palette ---- */
    #palette {
      position: absolute; bottom: 26px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 12px; align-items: center;
    }
    .swatch {
      width: 34px; height: 34px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.25);
      box-shadow: 0 3px 10px rgba(0,0,0,0.5), inset 0 2px 6px rgba(255,255,255,0.25);
      transition: transform 0.12s ease, border-color 0.12s ease;
    }
    .swatch.active { transform: scale(1.35); border-color: #fff; }
    .swatch .key { display: none; }

    #hint {
      position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
      font-size: 11px; letter-spacing: 1px; opacity: 0.5; white-space: nowrap;
    }
    #auto-badge {
      position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%);
      font-size: 11px; letter-spacing: 2px; font-weight: 700; opacity: 0;
      color: #ffd23f; transition: opacity 0.2s;
    }
    #auto-badge.show { opacity: 1; }

    /* ---- hit popups ---- */
    .popup {
      position: fixed; z-index: 15; pointer-events: none;
      font-weight: 900; font-size: 22px;
      transform: translate(-50%, -50%);
      animation: pop 0.7s ease-out forwards;
    }
    @keyframes pop {
      0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
      20%  { opacity: 1; transform: translate(-50%, -90%) scale(1.1); }
      100% { opacity: 0; transform: translate(-50%, -180%) scale(0.9); }
    }
  </style>
  <script type="module" crossorigin src="./assets/index-DYAueUb8.js"></script>
</head>
<body>
  <canvas id="scene"></canvas>

  <svg id="crosshair" viewBox="0 0 34 34" fill="none">
    <circle cx="17" cy="17" r="13" stroke="white" stroke-width="2" opacity="0.85"/>
    <circle cx="17" cy="17" r="1.5" fill="white"/>
    <line x1="17" y1="1" x2="17" y2="7" stroke="white" stroke-width="2"/>
    <line x1="17" y1="27" x2="17" y2="33" stroke="white" stroke-width="2"/>
    <line x1="1" y1="17" x2="7" y2="17" stroke="white" stroke-width="2"/>
    <line x1="27" y1="17" x2="33" y2="17" stroke="white" stroke-width="2"/>
  </svg>

  <div id="hud">
    <div class="hud-top">
      <div>
        <div class="stat-label">Splats</div>
        <div class="stat-value" id="splats">0</div>
      </div>
      <div id="combo-wrap">
        <div id="combo">x2</div>
        <div class="stat-label">combo</div>
      </div>
      <div id="score-wrap">
        <div class="stat-label">Score</div>
        <div class="stat-value" id="score">0</div>
      </div>
    </div>
    <div id="auto-badge">AUTO-CYCLE</div>
    <div id="palette"></div>
    <div id="hint">MOVE mouse to aim &nbsp;·&nbsp; CLICK to fire paint &nbsp;·&nbsp; 1-5 color &nbsp;·&nbsp; 0 auto-cycle</div>
  </div>

</body>
</html>
