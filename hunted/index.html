<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>HUNTED</title>
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #05060a; }
    #app { position: fixed; inset: 0; touch-action: none; }
    canvas { display: block; width: 100%; height: 100%; }

    /* ---- HUD ---- */
    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: max(14px, env(safe-area-inset-top)) 18px 0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      pointer-events: none; user-select: none; z-index: 10;
    }
    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat.right { align-items: flex-end; }
    .stat .label { font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: #5d6b8a; font-weight: 600; }
    .stat .value { font-size: 26px; font-weight: 700; color: #e8f0ff; font-variant-numeric: tabular-nums; line-height: 1; text-shadow: 0 0 12px rgba(120,180,255,0.35); }
    #pickups .value { color: #7CFFB2; text-shadow: 0 0 12px rgba(124,255,178,0.5); }
    #hunters .value { color: #ff6b6b; text-shadow: 0 0 12px rgba(255,107,107,0.5); }
    #burst { font-size: 11px; letter-spacing: 2px; color: #7CFFB2; font-weight: 700; opacity: 0; transition: opacity .2s; text-transform: uppercase; margin-top: 4px; }
    #burst.on { opacity: 1; }

    /* ---- Overlay ---- */
    #overlay {
      position: fixed; inset: 0; z-index: 20;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 24px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: radial-gradient(ellipse at center, rgba(8,10,20,0.78) 0%, rgba(3,4,8,0.94) 70%);
      backdrop-filter: blur(3px);
      transition: opacity .35s ease;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }
    #title {
      font-size: clamp(48px, 16vw, 110px); font-weight: 800; letter-spacing: 6px;
      color: #fff; line-height: .95;
      background: linear-gradient(180deg, #fff 0%, #9fb6ff 100%);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 28px rgba(120,150,255,0.45));
    }
    #subtitle { margin-top: 14px; font-size: 15px; line-height: 1.6; color: #aab6d4; max-width: 440px; }
    #subtitle b { color: #7CFFB2; }
    #subtitle .danger { color: #ff7b7b; }
    #result { margin-top: 18px; font-size: 17px; color: #ffd27b; min-height: 22px; font-weight: 600; }
    #playBtn {
      margin-top: 30px; pointer-events: auto; cursor: pointer;
      font-size: 17px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
      color: #06121a; background: linear-gradient(180deg, #9CFFD0 0%, #4be39a 100%);
      border: none; border-radius: 999px; padding: 16px 52px;
      box-shadow: 0 0 30px rgba(75,227,154,0.5), inset 0 1px 0 rgba(255,255,255,0.4);
      transition: transform .12s ease, box-shadow .2s ease;
    }
    #playBtn:hover { transform: translateY(-2px); box-shadow: 0 0 44px rgba(75,227,154,0.7), inset 0 1px 0 rgba(255,255,255,0.4); }
    #playBtn:active { transform: translateY(0) scale(0.97); }
    #hint { position: fixed; bottom: max(20px, env(safe-area-inset-bottom)); left: 0; right: 0; text-align: center;
      font-family: system-ui, sans-serif; font-size: 12px; letter-spacing: 1.5px; color: #41506f; pointer-events: none; z-index: 10; }
  </style>
  <script type="module" crossorigin src="./assets/index-DfFXen8f.js"></script>
</head>
<body>
  <div id="app"></div>

  <div id="hud">
    <div class="stat" id="timer-stat">
      <span class="label">Survived</span>
      <span class="value" id="timer">0.0s</span>
      <span id="burst">⚡ BURST</span>
    </div>
    <div class="stat right" id="pickups">
      <span class="label">Energy</span>
      <span class="value" id="pickupCount">0</span>
    </div>
    <div class="stat right" id="hunters" style="position:absolute; right:18px; top:64px;">
      <span class="label">Hunters</span>
      <span class="value" id="hunterCount">0</span>
    </div>
  </div>

  <div id="hint">drag anywhere to move</div>

  <div id="overlay">
    <div id="title">HUNTED</div>
    <div id="subtitle">
      You are the <b>glowing prey</b>. A pack of <span class="danger">hunters</span> will try to cut you off —
      they aim where you're <i>going</i>, not where you are. Grab <b>energy</b> to burst away. Stay alive.
    </div>
    <div id="result"></div>
    <button id="playBtn">Play</button>
  </div>

</body>
</html>
