<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Haul — delivery time trial</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0f14; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }

      /* ---------------- HUD ---------------- */
      #hud {
        position: fixed; inset: 0; pointer-events: none;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        color: #eef3f8; user-select: none;
      }
      .hud-top {
        position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
        display: flex; gap: 14px; align-items: stretch;
      }
      .card {
        background: rgba(10, 16, 24, 0.66);
        border: 1px solid rgba(120, 170, 220, 0.22);
        border-radius: 12px; padding: 8px 16px;
        backdrop-filter: blur(6px);
        box-shadow: 0 6px 22px rgba(0,0,0,0.45);
        text-align: center; min-width: 92px;
      }
      .card .label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.6; }
      .card .value { font-size: 26px; font-weight: 700; line-height: 1.15; font-variant-numeric: tabular-nums; }
      #timeCard .value.warn { color: #ff6b5e; }
      #objective {
        position: absolute; top: 16px; left: 16px;
        background: rgba(10,16,24,0.6); border: 1px solid rgba(120,170,220,0.2);
        border-radius: 10px; padding: 8px 14px; max-width: 240px;
      }
      #objective .label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.55; }
      #objective .text { font-size: 15px; font-weight: 600; margin-top: 2px; }
      #objective .dot { display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:7px; vertical-align: middle; }
      #speedo {
        position: absolute; bottom: 18px; right: 22px; text-align: right;
      }
      #speedo .value { font-size: 40px; font-weight: 800; font-variant-numeric: tabular-nums; }
      #speedo .unit { font-size: 13px; letter-spacing: 2px; opacity: 0.6; }
      #help {
        position: absolute; bottom: 18px; left: 22px;
        font-size: 12px; line-height: 1.7; opacity: 0.62;
      }
      #help kbd {
        background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.18);
        border-radius: 5px; padding: 1px 6px; font-size: 11px; font-family: inherit;
      }
      /* ---------------- Banners ---------------- */
      #banner {
        position: absolute; top: 38%; left: 50%; transform: translate(-50%,-50%);
        text-align: center; opacity: 0; transition: opacity 0.25s ease;
      }
      #banner.show { opacity: 1; }
      #banner .big { font-size: 52px; font-weight: 800; text-shadow: 0 4px 20px rgba(0,0,0,0.6); }
      #banner .sub { font-size: 18px; opacity: 0.8; margin-top: 6px; }
      #overlay {
        position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
        background: radial-gradient(ellipse at center, rgba(8,12,18,0.55), rgba(8,12,18,0.86));
        opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
      }
      #overlay.show { opacity: 1; pointer-events: auto; }
      #overlay .panel {
        background: rgba(14, 20, 30, 0.92); border: 1px solid rgba(120,170,220,0.25);
        border-radius: 18px; padding: 34px 44px; text-align: center; max-width: 420px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      }
      #overlay h1 { font-size: 38px; margin-bottom: 6px; }
      #overlay p { opacity: 0.78; font-size: 15px; line-height: 1.5; margin-bottom: 8px; }
      #overlay .score { font-size: 22px; font-weight: 700; margin: 14px 0 18px; }
      #overlay button {
        pointer-events: auto; cursor: pointer; font: inherit; font-weight: 700; font-size: 16px;
        color: #08121e; background: linear-gradient(180deg,#7fd0ff,#39a9ff);
        border: none; border-radius: 10px; padding: 12px 28px;
        box-shadow: 0 8px 24px rgba(57,169,255,0.4);
      }
      #overlay button:active { transform: translateY(1px); }
    </style>
    <script type="module" crossorigin src="./assets/index-C_vW4lIi.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <div id="objective">
        <div class="label">Objective</div>
        <div class="text"><span class="dot" style="background:#ffd23f"></span><span id="objText">Drive to the PICKUP</span></div>
      </div>
      <div class="hud-top">
        <div class="card" id="timeCard"><div class="label">Time</div><div class="value" id="timeVal">90.0</div></div>
        <div class="card"><div class="label">Delivered</div><div class="value" id="runsVal">0 / 3</div></div>
        <div class="card"><div class="label">Score</div><div class="value" id="scoreVal">0</div></div>
      </div>
      <div id="speedo"><span class="value" id="speedVal">0</span> <span class="unit">KM/H</span></div>
      <div id="help">
        <kbd>W</kbd>/<kbd>↑</kbd> throttle &nbsp; <kbd>S</kbd>/<kbd>↓</kbd> brake/reverse<br />
        <kbd>A</kbd><kbd>D</kbd>/<kbd>←</kbd><kbd>→</kbd> steer &nbsp; <kbd>Space</kbd> handbrake &nbsp; <kbd>R</kbd> reset
      </div>
      <div id="banner"><div class="big" id="bannerBig"></div><div class="sub" id="bannerSub"></div></div>
      <div id="overlay">
        <div class="panel">
          <h1 id="ovTitle">HAUL</h1>
          <p id="ovBody">Deliver the cargo. Pick up at the yellow pad, drop at the green pad. Three runs before the clock hits zero.</p>
          <div class="score" id="ovScore"></div>
          <button id="ovBtn">Start driving</button>
        </div>
      </div>
    </div>
  </body>
</html>
