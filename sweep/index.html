<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sweep — 3D Curling</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0a1622; font-family: -apple-system, system-ui, 'Segoe UI', sans-serif; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }

      #hud {
        position: fixed; top: 0; left: 0; right: 0;
        padding: 14px 20px;
        display: flex; justify-content: space-between; align-items: flex-start;
        pointer-events: none;
        color: #eaf2fb;
        text-shadow: 0 1px 3px rgba(0,0,0,.7);
      }
      .panel {
        background: rgba(8, 22, 38, .62);
        border: 1px solid rgba(120, 180, 240, .25);
        border-radius: 10px;
        padding: 10px 14px;
        backdrop-filter: blur(6px);
      }
      #hud .big { font-size: 26px; font-weight: 700; letter-spacing: .5px; }
      #hud .sub { font-size: 12px; opacity: .8; margin-top: 2px; }
      #stones { display: flex; gap: 6px; margin-top: 6px; }
      .stone-dot { width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(255,255,255,.5); }
      .stone-dot.used { background: #c0392b; }
      .stone-dot.left { background: #2ecc71; }

      #power-wrap {
        position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%);
        width: 360px; max-width: 80vw;
        pointer-events: none;
        text-align: center;
      }
      #power-bar {
        height: 16px; border-radius: 8px;
        background: rgba(8,22,38,.6);
        border: 1px solid rgba(120,180,240,.3);
        overflow: hidden;
      }
      #power-fill {
        height: 100%; width: 0%;
        background: linear-gradient(90deg, #2ecc71, #f1c40f, #e74c3c);
        transition: width .03s linear;
      }
      #power-label { font-size: 12px; color: #cfe2f5; margin-top: 6px; text-shadow: 0 1px 2px #000; }

      #hint {
        position: fixed; left: 50%; bottom: 78px; transform: translateX(-50%);
        font-size: 13px; color: #bcd3ec; text-align: center;
        background: rgba(8,22,38,.55); padding: 6px 12px; border-radius: 8px;
        border: 1px solid rgba(120,180,240,.2);
        pointer-events: none; white-space: nowrap;
      }
      #sweep-flag {
        position: fixed; left: 50%; top: 60px; transform: translateX(-50%);
        font-size: 15px; font-weight: 700; color: #0a1622;
        background: #2ecc71; padding: 5px 16px; border-radius: 20px;
        opacity: 0; transition: opacity .12s; pointer-events: none;
        box-shadow: 0 2px 12px rgba(46,204,113,.5);
      }
      #sweep-flag.on { opacity: 1; }
      #toast {
        position: fixed; left: 50%; top: 50%; transform: translate(-50%,-50%);
        font-size: 30px; font-weight: 800; color: #fff;
        opacity: 0; transition: opacity .25s; pointer-events: none;
        text-shadow: 0 3px 14px rgba(0,0,0,.8);
      }
      #toast.on { opacity: 1; }
    </style>
    <script type="module" crossorigin src="./assets/index-D6bxtbuL.js"></script>
  </head>
  <body>
    <div id="app"></div>

    <div id="hud">
      <div class="panel">
        <div class="big">Score <span id="score">0</span></div>
        <div class="sub">End <span id="end">1</span> · 3 stones</div>
        <div id="stones"></div>
      </div>
      <div class="panel" style="text-align:right">
        <div class="big" id="phase">AIM</div>
        <div class="sub" id="last">—</div>
      </div>
    </div>

    <div id="sweep-flag">SWEEPING — low friction</div>
    <div id="toast"></div>

    <div id="hint">Drag on the ice or use ← → to aim · hold to charge / SPACE charges · release to throw · hold SPACE while moving to SWEEP</div>
    <div id="power-wrap">
      <div id="power-bar"><div id="power-fill"></div></div>
      <div id="power-label">POWER</div>
    </div>

  </body>
</html>
