<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beacon Run — top-down arena</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #070b12; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }

      /* ---------------- HUD ---------------- */
      #hud {
        position: fixed; inset: 0; pointer-events: none;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        color: #eaf2fb; user-select: none;
      }
      .hud-top {
        position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
        display: flex; gap: 14px; align-items: stretch;
      }
      .card {
        background: rgba(9, 14, 22, 0.66);
        border: 1px solid rgba(120, 180, 230, 0.22);
        border-radius: 12px; padding: 8px 18px;
        backdrop-filter: blur(6px);
        box-shadow: 0 6px 22px rgba(0,0,0,0.45);
        text-align: center; min-width: 96px;
      }
      .card .label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.6; }
      .card .value { font-size: 26px; font-weight: 700; line-height: 1.15; font-variant-numeric: tabular-nums; }
      #beaconCard .value { color: #ffd86b; }
      #scoreCard .value { color: #8ef0c0; }
      #timeCard .value.warn { color: #ff6b5e; }

      #objective {
        position: absolute; top: 16px; left: 16px;
        background: rgba(9,14,22,0.62); border: 1px solid rgba(120,180,230,0.2);
        border-radius: 10px; padding: 9px 15px; max-width: 260px;
      }
      #objective .label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.55; }
      #objective .text { font-size: 15px; font-weight: 600; margin-top: 3px; line-height: 1.3; }
      #objective .dot { display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:7px; vertical-align: middle; background:#ffd86b; box-shadow:0 0 8px #ffd86b; }

      #help {
        position: absolute; bottom: 18px; left: 22px;
        font-size: 12px; line-height: 1.8; opacity: 0.62;
      }
      #help kbd {
        background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.18);
        border-radius: 5px; padding: 1px 6px; font-size: 11px; font-family: inherit;
      }
      #status {
        position: absolute; bottom: 18px; right: 22px; text-align: right;
        font-size: 12px; line-height: 1.7; opacity: 0.7;
      }
      #status .row { display:flex; gap:8px; justify-content:flex-end; align-items:center; }
      #status .pip { display:inline-block; width:10px; height:10px; border-radius:3px; }

      /* ---------------- Banner (transient feedback) ---------------- */
      #banner {
        position: absolute; top: 30%; left: 50%; transform: translate(-50%,-50%);
        text-align: center; opacity: 0; transition: opacity 0.22s ease;
        pointer-events: none;
      }
      #banner.show { opacity: 1; }
      #banner .big { font-size: 46px; font-weight: 800; text-shadow: 0 4px 20px rgba(0,0,0,0.6); }
      #banner .sub { font-size: 17px; opacity: 0.85; margin-top: 6px; }

      /* hit flash — full-screen vignette pulse on wall bump / hazard */
      #flash {
        position: absolute; inset: 0; pointer-events: none; opacity: 0;
        box-shadow: inset 0 0 160px 40px rgba(255, 80, 70, 0.0);
        transition: opacity 0.05s ease;
      }

      /* ---------------- End overlay ---------------- */
      #overlay {
        position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
        background: radial-gradient(ellipse at center, rgba(7,11,18,0.55), rgba(7,11,18,0.88));
        opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
      }
      #overlay.show { opacity: 1; pointer-events: auto; }
      #overlay .panel {
        background: rgba(13, 19, 29, 0.93); border: 1px solid rgba(120,180,230,0.25);
        border-radius: 18px; padding: 32px 44px; text-align: center; max-width: 430px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      }
      #overlay h1 { font-size: 36px; margin-bottom: 6px; }
      #overlay p { opacity: 0.78; font-size: 15px; line-height: 1.5; margin-bottom: 8px; }
      #overlay .score { font-size: 22px; font-weight: 700; margin: 14px 0 18px; }
      #overlay button {
        pointer-events: auto; cursor: pointer; font: inherit; font-weight: 700; font-size: 16px;
        color: #08121e; background: linear-gradient(180deg,#8ee0ff,#39a9ff);
        border: none; border-radius: 10px; padding: 11px 26px;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-CPLlo_np.js"></script>
  </head>
  <body>
    <div id="app"></div>

    <div id="hud">
      <div class="hud-top">
        <div class="card" id="beaconCard">
          <div class="label">Beacons</div>
          <div class="value"><span id="beaconsLit">0</span>/<span id="beaconsTotal">0</span></div>
        </div>
        <div class="card" id="scoreCard">
          <div class="label">Score</div>
          <div class="value" id="score">0</div>
        </div>
        <div class="card" id="timeCard">
          <div class="label">Time</div>
          <div class="value" id="time">0.0</div>
        </div>
      </div>

      <div id="objective">
        <div class="label">Objective</div>
        <div class="text"><span class="dot"></span><span id="objectiveText">Light beacon 1</span></div>
      </div>

      <div id="status">
        <div class="row"><span>Shards</span><b id="shardsCount">0/0</b></div>
        <div class="row" id="extractRow" style="opacity:0.45"><span>Extraction</span><span class="pip" style="background:#ff6b5e"></span></div>
      </div>

      <div id="help">
        <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> / arrows — fly the drone &nbsp;·&nbsp; light beacons in order, grab shards, reach extraction
      </div>

      <div id="banner"><div class="big"></div><div class="sub"></div></div>
      <div id="flash"></div>
    </div>

    <div id="overlay">
      <div class="panel">
        <h1 id="overlayTitle">Extraction complete</h1>
        <p id="overlayBody">All beacons lit. You reached the pad.</p>
        <div class="score" id="overlayScore">Score 0</div>
        <button id="restartBtn">Run again</button>
      </div>
    </div>

  </body>
</html>
