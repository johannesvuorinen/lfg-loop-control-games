<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Crypt — a three.js roguelike</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; background: #05060a; overflow: hidden; font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; }
      #scene { display: block; width: 100vw; height: 100vh; touch-action: none; }
      #hud {
        position: fixed; left: 0; top: 0; width: 100%;
        padding: 10px 12px; pointer-events: none; color: #cdd6f4;
        text-shadow: 0 1px 3px #000; font-size: 13px; line-height: 1.45;
        display: flex; justify-content: space-between; align-items: flex-start;
      }
      #hud .right { text-align: right; }
      #hud b { color: #f9e2af; }
      #hud .hp { color: #f38ba8; }
      #banner {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        flex-direction: column; gap: 10px; pointer-events: none; text-align: center;
        color: #f5f5ff; text-shadow: 0 2px 10px #000;
      }
      #banner .title { font-size: 34px; letter-spacing: 4px; color: #f9e2af; }
      #banner .sub { font-size: 14px; opacity: .85; max-width: 80%; }
      #banner.hidden { display: none; }
      .blink { animation: b 1s steps(2, start) infinite; }
      @keyframes b { to { opacity: .25; } }
      /* on-screen dpad for the screenshot harness / touch */
      #pad { position: fixed; right: 14px; bottom: 16px; width: 150px; height: 150px; pointer-events: auto; opacity: .9; }
      #pad button {
        position: absolute; width: 48px; height: 48px; border-radius: 10px;
        background: #1e1e2eaa; border: 1px solid #45475a; color: #cdd6f4;
        font-size: 20px; font-family: inherit; cursor: pointer;
      }
      #pad button:active { background: #585b70; }
      #pad .up { left: 51px; top: 0; } #pad .down { left: 51px; top: 102px; }
      #pad .left { left: 0; top: 51px; } #pad .right { left: 102px; top: 51px; }
    </style>
    <script type="module" crossorigin src="./assets/index-CN_6Y4zL.js"></script>
  </head>
  <body>
    <canvas id="scene"></canvas>
    <div id="hud">
      <div class="left">
        <div>CRYPT · depth <b id="depth">1</b></div>
        <div class="hp" id="hpbar">HP ♥♥♥</div>
        <div>gold <b id="gold">0</b></div>
      </div>
      <div class="right">
        <div>seen <b id="seen">0</b>%</div>
        <div>WASD / arrows · find the <b>stairs ▼</b></div>
      </div>
    </div>
    <div id="banner">
      <div class="title">CRYPT</div>
      <div class="sub blink">descend into the dark — press any key / tap to begin</div>
    </div>
    <div id="pad">
      <button class="up" data-dir="up">▲</button>
      <button class="down" data-dir="down">▼</button>
      <button class="left" data-dir="left">◀</button>
      <button class="right" data-dir="right">▶</button>
    </div>
  </body>
</html>
