<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Pattern Pairs</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0e1726;
      color: #e8eef6;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }
    #app { position: fixed; inset: 0; display: flex; flex-direction: column; }

    #hud {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
      background: rgba(255, 255, 255, 0.04);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      flex: 0 0 auto;
      z-index: 2;
    }
    #hud .pill {
      background: rgba(255, 255, 255, 0.08);
      padding: 6px 12px;
      border-radius: 999px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    #title { margin-right: auto; font-weight: 800; letter-spacing: 0.06em; }
    #hint { margin-left: auto; opacity: 0.55; font-weight: 400; font-size: 12px; }

    #stage { position: relative; flex: 1 1 auto; min-height: 0; }
    #game { display: block; width: 100%; height: 100%; touch-action: none; }

    #banner {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      background: rgba(8, 12, 20, 0.78);
      backdrop-filter: blur(4px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      text-align: center;
      padding: 24px;
      z-index: 3;
    }
    #banner.show { opacity: 1; pointer-events: auto; }
    #banner-text { font-size: clamp(18px, 4vw, 28px); font-weight: 700; max-width: 540px; }
    #banner-btn {
      font: inherit;
      font-weight: 700;
      font-size: 17px;
      color: #0e1726;
      background: #2ecc71;
      border: none;
      padding: 12px 26px;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(46, 204, 113, 0.35);
    }
    #banner-btn:active { transform: translateY(1px); }
  </style>

  <!-- Importmap so `import ... from 'three'` resolves to the vendored ES module.
       No bundler / build step: works on plain static hosting (GitHub Pages). -->
  <script type="importmap">
    {
      "imports": {
        "three": "./vendor/three.module.js"
      }
    }
  </script>
</head>
<body>
  <div id="app">
    <div id="hud">
      <span id="title">PATTERN&nbsp;PAIRS</span>
      <span class="pill" id="hud-level">Level 1/3</span>
      <span class="pill" id="hud-pairs">Pairs 0/4</span>
      <span class="pill" id="hud-moves">Moves 0</span>
      <span id="hint">match the patterns &middot; press R to reset</span>
    </div>
    <div id="stage">
      <canvas id="game"></canvas>
      <div id="banner">
        <div id="banner-text"></div>
        <button id="banner-btn">Next</button>
      </div>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
