<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ascend</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0b1026;
        font-family:
          ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      canvas {
        display: block;
      }
      /* ---- HUD (no engine UI layer; hand-rolled DOM overlay) ---- */
      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        user-select: none;
      }
      #score {
        position: absolute;
        top: 16px;
        left: 18px;
        font-size: 26px;
        font-weight: 700;
        letter-spacing: 0.5px;
        color: #eaf2ff;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
      }
      #score .label {
        font-size: 12px;
        opacity: 0.65;
        font-weight: 400;
        letter-spacing: 2px;
        text-transform: uppercase;
        display: block;
      }
      #hint {
        position: absolute;
        bottom: 14px;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 12px;
        letter-spacing: 1px;
        color: rgba(234, 242, 255, 0.55);
      }
      /* ---- Centered GAME OVER banner ---- */
      #banner {
        position: absolute;
        inset: 0;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        background: radial-gradient(
          ellipse at center,
          rgba(11, 16, 38, 0.35) 0%,
          rgba(11, 16, 38, 0.78) 70%
        );
      }
      #banner.show {
        display: flex;
      }
      #banner h1 {
        font-size: 54px;
        font-weight: 800;
        letter-spacing: 3px;
        color: #ff5d73;
        text-shadow: 0 4px 24px rgba(255, 93, 115, 0.5);
      }
      #banner .final {
        font-size: 22px;
        color: #eaf2ff;
      }
      #banner .restart {
        margin-top: 6px;
        font-size: 13px;
        letter-spacing: 1px;
        color: rgba(234, 242, 255, 0.7);
        pointer-events: auto;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-CFWyORsS.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <div id="score">
        <span class="label">Height</span>
        <span id="score-value">0</span>
      </div>
      <div id="hint">&#9664; &#9654; / A &middot; D to steer &mdash; wraps around edges</div>
      <div id="banner">
        <h1>GAME OVER</h1>
        <div class="final">Best height <span id="final-value">0</span></div>
        <div class="restart">press &nbsp;SPACE&nbsp; or click to restart</div>
      </div>
    </div>
  </body>
</html>
