<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hoist — gravity gun</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }

      /* Crosshair */
      #crosshair {
        position: fixed; left: 50%; top: 50%;
        width: 22px; height: 22px;
        transform: translate(-50%, -50%);
        pointer-events: none; z-index: 10;
      }
      #crosshair::before, #crosshair::after {
        content: ""; position: absolute; background: rgba(255,255,255,0.85);
        box-shadow: 0 0 2px rgba(0,0,0,0.8);
      }
      #crosshair::before { left: 50%; top: 0; width: 2px; height: 100%; transform: translateX(-50%); }
      #crosshair::after  { top: 50%; left: 0; height: 2px; width: 100%; transform: translateY(-50%); }
      #crosshair.holding::before, #crosshair.holding::after { background: #6cf0c2; }

      /* HUD */
      #hud {
        position: fixed; top: 14px; left: 14px; z-index: 10;
        font: 14px/1.5 ui-monospace, "SF Mono", Menlo, monospace;
        color: #cfe8ff; text-shadow: 0 1px 2px #000;
        background: rgba(10,14,22,0.55); padding: 10px 14px;
        border: 1px solid rgba(108,240,194,0.25); border-radius: 8px;
        backdrop-filter: blur(4px); user-select: none;
      }
      #hud b { color: #6cf0c2; }
      #score { font-size: 18px; }

      /* Click-to-play overlay */
      #overlay {
        position: fixed; inset: 0; z-index: 20;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: rgba(6,8,14,0.78); cursor: pointer;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; color: #e8f2ff;
        text-align: center;
      }
      #overlay.hidden { display: none; }
      #overlay h1 { font-size: 40px; letter-spacing: 1px; margin-bottom: 8px; color: #6cf0c2; }
      #overlay p { font-size: 16px; opacity: 0.85; max-width: 460px; margin: 4px 0; }
      #overlay .keys { margin-top: 18px; font: 14px/1.7 ui-monospace, Menlo, monospace; opacity: 0.9; }
      #overlay .keys span { color: #6cf0c2; }
    </style>
    <script type="module" crossorigin src="./assets/index-CzzJdKJU.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <div id="crosshair"></div>
    <div id="hud">
      <div id="score">Hits: <b>0</b></div>
      <div style="margin-top:6px;opacity:0.8">
        <span id="state">free</span>
      </div>
    </div>
    <div id="overlay">
      <h1>HOIST</h1>
      <p>A first-person gravity gun. Grab a crate, carry it, and hurl it at the glowing targets.</p>
      <div class="keys">
        <span>WASD</span> move &nbsp;·&nbsp; <span>MOUSE</span> look &nbsp;·&nbsp; <span>HOLD LMB</span> grab<br />
        release LMB to drop &nbsp;·&nbsp; <span>RMB</span> while holding to LAUNCH &nbsp;·&nbsp; <span>SPACE</span> jump
      </div>
      <p style="margin-top:22px;font-weight:600;">Click to play</p>
    </div>
  </body>
</html>
