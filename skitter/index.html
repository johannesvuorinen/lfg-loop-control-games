<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skitter</title>
    <!-- inline favicon (a green dot) so there's no 404 -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='12' fill='%237ee787'/%3E%3C/svg%3E" />
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0d1117; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }

      #hud {
        position: fixed;
        top: 16px;
        left: 16px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        color: #e6edf3;
        text-shadow: 0 1px 2px rgba(0,0,0,0.6);
        pointer-events: none;
        user-select: none;
        line-height: 1.5;
      }
      #hud .title { font-size: 20px; font-weight: 700; letter-spacing: 0.5px; color: #7ee787; }
      #hud .score { font-size: 16px; }
      #hud .hint  { font-size: 12px; opacity: 0.7; margin-top: 6px; }

      #banner {
        position: fixed;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 28px; font-weight: 700;
        color: #7ee787;
        text-shadow: 0 2px 8px rgba(0,0,0,0.8);
        pointer-events: none;
        user-select: none;
        opacity: 0;
        transition: opacity 0.4s ease;
        text-align: center;
      }
      #banner.show { opacity: 1; }
    </style>
    <script type="module" crossorigin src="./assets/index-CKq3QAQM.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <div class="title">SKITTER</div>
      <div class="score">Pickups: <span id="score">0</span> / <span id="total">0</span></div>
      <div class="hint">WASD / Arrows to walk &amp; turn &middot; collect the glowing orbs</div>
    </div>
    <div id="banner"></div>
  </body>
</html>
