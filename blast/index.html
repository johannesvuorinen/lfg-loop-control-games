<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blast — grid arena</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0c14; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }

      /* ---------- HUD ---------- */
      #hud {
        position: fixed;
        top: 14px;
        left: 14px;
        z-index: 10;
        display: flex;
        gap: 10px;
        font-family: 'Segoe UI', system-ui, sans-serif;
        pointer-events: none;
        user-select: none;
      }
      .stat {
        background: rgba(12, 16, 28, 0.72);
        border: 1px solid rgba(120, 160, 255, 0.28);
        border-radius: 10px;
        padding: 8px 14px;
        min-width: 88px;
        backdrop-filter: blur(6px);
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.35);
      }
      .stat .label {
        font-size: 10px;
        letter-spacing: 1.4px;
        text-transform: uppercase;
        color: #8fa6d8;
      }
      .stat .value {
        font-size: 26px;
        font-weight: 700;
        line-height: 1.05;
        color: #fff;
      }
      .stat.enemies .value { color: #ff7a6b; }
      .stat.bombs .value   { color: #ffd166; }
      .stat.range .value   { color: #6be4ff; }

      #help {
        position: fixed;
        bottom: 12px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        font-family: 'Segoe UI', system-ui, sans-serif;
        font-size: 13px;
        color: #9fb0d8;
        background: rgba(12, 16, 28, 0.6);
        border: 1px solid rgba(120, 160, 255, 0.2);
        border-radius: 999px;
        padding: 7px 18px;
        pointer-events: none;
        user-select: none;
      }
      #help b { color: #dfe8ff; }

      /* ---------- end-game banner ---------- */
      #banner {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: rgba(6, 8, 16, 0.66);
        backdrop-filter: blur(3px);
        font-family: 'Segoe UI', system-ui, sans-serif;
        text-align: center;
      }
      #banner.show { display: flex; }
      #banner h1 {
        font-size: 72px;
        letter-spacing: 4px;
        text-shadow: 0 6px 30px rgba(0, 0, 0, 0.6);
      }
      #banner.win h1  { color: #7CFFB2; }
      #banner.lose h1 { color: #ff6b5e; }
      #banner p { font-size: 17px; color: #c7d2ee; }
      #banner .hint {
        font-size: 14px;
        color: #8fa0c8;
        border: 1px solid rgba(150,180,255,.3);
        border-radius: 999px;
        padding: 8px 20px;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-j0AMT-6s.js"></script>
  </head>
  <body>
    <div id="app"></div>

    <div id="hud">
      <div class="stat enemies"><div class="label">Enemies</div><div class="value" id="hud-enemies">0</div></div>
      <div class="stat bombs"><div class="label">Bombs</div><div class="value" id="hud-bombs">0/1</div></div>
      <div class="stat range"><div class="label">Range</div><div class="value" id="hud-range">1</div></div>
    </div>

    <div id="help"><b>WASD</b> move &nbsp;·&nbsp; <b>Space</b> bomb &nbsp;·&nbsp; <b>R</b> restart</div>

    <div id="banner">
      <h1 id="banner-title">WIN</h1>
      <p id="banner-sub">All enemies cleared.</p>
      <div class="hint">Press <b>R</b> to play again</div>
    </div>

  </body>
</html>
