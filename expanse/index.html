<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expanse — a streaming open world (three.js)</title>
    <style>
      :root {
        --fg: #e8f0ff;
        --accent: #5ad1ff;
        --gold: #ffd45a;
        --panel: rgba(8, 14, 28, 0.62);
        --stroke: rgba(120, 180, 255, 0.28);
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0; height: 100%; overflow: hidden;
        background: #05070f; color: var(--fg);
        font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
        user-select: none;
      }
      #app { position: fixed; inset: 0; }
      canvas { display: block; width: 100%; height: 100%; }

      /* ---------- HUD ---------- */
      #hud {
        position: fixed; inset: 0; pointer-events: none;
        padding: 18px; display: flex; flex-direction: column;
        justify-content: space-between;
      }
      .row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
      .panel {
        background: var(--panel); border: 1px solid var(--stroke);
        border-radius: 12px; padding: 12px 16px; backdrop-filter: blur(8px);
        box-shadow: 0 8px 30px rgba(0,0,0,0.35);
      }
      .title { font-size: 13px; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; opacity: 0.92; }
      .sub { font-size: 11px; opacity: 0.55; margin-top: 2px; letter-spacing: 1px; }
      .stats { text-align: right; font-size: 12px; line-height: 1.7; }
      .stats b { color: var(--gold); font-weight: 600; }
      .k { opacity: 0.55; }

      /* progress / loading bar */
      #loadwrap {
        align-self: center; width: min(440px, 76vw); margin-bottom: 6px;
      }
      #loadbar-track {
        height: 8px; border-radius: 99px; overflow: hidden;
        background: rgba(255,255,255,0.08); border: 1px solid var(--stroke);
      }
      #loadbar-fill {
        height: 100%; width: 0%;
        background: linear-gradient(90deg, var(--accent), var(--gold));
        transition: width 0.12s linear;
      }
      #loadlabel { font-size: 11px; letter-spacing: 1px; text-align: center; margin-top: 6px; opacity: 0.7; }

      /* progress toward waypoint */
      #progwrap { width: min(440px, 76vw); align-self: center; }
      #prog-track { height: 6px; border-radius: 99px; background: rgba(255,255,255,0.07); overflow: hidden; border: 1px solid var(--stroke); }
      #prog-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #4f7dff, var(--accent)); transition: width 0.2s ease; }
      #prog-label { font-size: 10px; letter-spacing: 2px; text-align: center; margin-top: 5px; opacity: 0.6; text-transform: uppercase; }

      /* ARRIVED banner */
      #arrived {
        position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
        pointer-events: none;
      }
      #arrived .card {
        text-align: center; padding: 30px 56px; border-radius: 18px;
        background: rgba(8,16,30,0.78); border: 1px solid var(--gold);
        box-shadow: 0 0 60px rgba(255, 212, 90, 0.35);
        animation: pop 0.5s cubic-bezier(.2,1.4,.4,1);
      }
      #arrived h1 { margin: 0; font-size: 46px; letter-spacing: 8px; color: var(--gold); text-shadow: 0 0 24px rgba(255,212,90,0.6); }
      #arrived p { margin: 10px 0 0; opacity: 0.75; letter-spacing: 2px; font-size: 13px; }
      @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

      #hint { font-size: 11px; opacity: 0.45; letter-spacing: 1px; text-align: center; }
    </style>
    <script type="module" crossorigin src="./assets/index-ByhEW_lS.js"></script>
  </head>
  <body>
    <div id="app"></div>

    <div id="hud">
      <!-- top row -->
      <div class="row">
        <div class="panel">
          <div class="title">EXPANSE</div>
          <div class="sub">streaming open world · three.js</div>
        </div>
        <div class="panel stats">
          <div><span class="k">DIST</span> <b id="s-dist">0</b> m</div>
          <div><span class="k">CHUNKS LIVE</span> <b id="s-chunks">0</b></div>
          <div><span class="k">STREAMED</span> <b id="s-streamed">0</b></div>
          <div><span class="k">MARKERS</span> <b id="s-markers">0</b></div>
          <div><span class="k">GEOM</span> <b id="s-geom">0</b></div>
        </div>
      </div>

      <!-- bottom column -->
      <div style="display:flex; flex-direction:column; gap:10px; align-items:center;">
        <div id="loadwrap" class="panel" style="display:none;">
          <div id="loadbar-track"><div id="loadbar-fill"></div></div>
          <div id="loadlabel">streaming chunk…</div>
        </div>
        <div id="progwrap" class="panel">
          <div id="prog-track"><div id="prog-fill"></div></div>
          <div id="prog-label">progress to waypoint</div>
        </div>
        <div id="hint">W / ↑ accelerate · A,D / ←,→ steer · auto-pilot engaged</div>
      </div>
    </div>

    <div id="arrived"><div class="card"><h1>ARRIVED!</h1><p id="arrived-sub">waypoint reached</p></div></div>

  </body>
</html>
