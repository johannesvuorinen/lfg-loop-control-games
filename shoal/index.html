<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#020912" />
    <title>Shoal</title>
    <!-- inline SVG favicon (a glowing fish) so there's no extra request / 404 -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23041018'/%3E%3Cpath d='M7 16c4-6 12-7 17-3-1 1-1 5 0 6-5 4-13 3-17-3z' fill='%236ff7ff'/%3E%3Cpath d='M24 13l4-3v12l-4-3z' fill='%2338c6f0'/%3E%3Ccircle cx='12' cy='15' r='1.3' fill='%23041018'/%3E%3C/svg%3E"
    />
    <style>
      :root {
        --ink: #061018;
        --glow: #6ff7ff;
        --warm: #ffd27a;
        --danger: #ff5a6e;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #020912; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        color: #dff6ff;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: none;
      }
      #app { position: fixed; inset: 0; }
      canvas { display: block; width: 100%; height: 100%; }

      /* ---------- HUD ---------- */
      #hud {
        position: fixed;
        top: 0; left: 0; right: 0;
        padding: env(safe-area-inset-top, 12px) 16px 12px;
        padding-top: max(env(safe-area-inset-top), 14px);
        display: flex;
        gap: 10px;
        justify-content: center;
        pointer-events: none;
        z-index: 10;
      }
      .stat {
        background: rgba(6, 22, 34, 0.55);
        border: 1px solid rgba(111, 247, 255, 0.22);
        border-radius: 14px;
        padding: 7px 14px;
        min-width: 76px;
        text-align: center;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.35);
      }
      .stat .label {
        font-size: 10px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        opacity: 0.62;
      }
      .stat .value {
        font-size: 22px;
        font-weight: 700;
        line-height: 1.15;
        font-variant-numeric: tabular-nums;
      }
      .stat.shoal .value { color: var(--glow); }
      .stat.banked .value { color: var(--warm); }
      .stat.score .value { color: #ffffff; }

      /* tiny "+N banked" flyout */
      #toast {
        position: fixed;
        top: 86px; left: 50%;
        transform: translateX(-50%) translateY(8px);
        background: rgba(255, 210, 122, 0.16);
        border: 1px solid rgba(255, 210, 122, 0.5);
        color: var(--warm);
        font-weight: 700;
        font-size: 15px;
        padding: 8px 16px;
        border-radius: 999px;
        opacity: 0;
        transition: opacity 0.25s ease, transform 0.25s ease;
        pointer-events: none;
        z-index: 11;
        white-space: nowrap;
      }
      #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

      /* ---------- Overlay ---------- */
      #overlay {
        position: fixed; inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        padding: 28px;
        text-align: center;
        background: radial-gradient(120% 90% at 50% 30%, rgba(8, 30, 48, 0.42), rgba(2, 9, 18, 0.86));
        backdrop-filter: blur(3px);
        -webkit-backdrop-filter: blur(3px);
        z-index: 20;
        transition: opacity 0.4s ease;
      }
      #overlay.hidden { opacity: 0; pointer-events: none; }
      #overlay h1 {
        font-size: clamp(40px, 13vw, 78px);
        font-weight: 800;
        letter-spacing: 0.04em;
        background: linear-gradient(180deg, #d6fbff, #57d2ff 60%, #2a9bd6);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow: 0 0 36px rgba(87, 210, 255, 0.35);
        margin-bottom: -4px;
      }
      #overlay .sub {
        font-size: 15px;
        line-height: 1.55;
        max-width: 360px;
        opacity: 0.82;
      }
      #overlay .sub b { color: var(--glow); font-weight: 700; }
      #overlay .sub .warn { color: var(--danger); font-weight: 700; }
      #finalLine {
        font-size: 18px;
        font-weight: 700;
        color: var(--warm);
        min-height: 22px;
      }
      #startBtn {
        margin-top: 6px;
        pointer-events: auto;
        cursor: pointer;
        border: none;
        border-radius: 999px;
        padding: 16px 44px;
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 0.04em;
        color: #042330;
        background: linear-gradient(180deg, #8ffaff, #38c6f0);
        box-shadow: 0 10px 30px rgba(56, 198, 240, 0.4), inset 0 1px 0 rgba(255,255,255,0.6);
        transition: transform 0.12s ease, box-shadow 0.12s ease;
      }
      #startBtn:active { transform: scale(0.96); box-shadow: 0 6px 18px rgba(56, 198, 240, 0.4); }
      .hint {
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        opacity: 0.5;
      }
      #loading {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        color: #5fcfee; font-size: 14px; letter-spacing: 0.2em; text-transform: uppercase;
        z-index: 30;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-snZa9fk_.js"></script>
  </head>
  <body>
    <div id="app"></div>

    <div id="loading">summoning the shoal…</div>

    <div id="hud" aria-hidden="true">
      <div class="stat shoal"><div class="label">Shoal</div><div class="value" id="shoalVal">0</div></div>
      <div class="stat banked"><div class="label">Banked</div><div class="value" id="bankedVal">0</div></div>
      <div class="stat score"><div class="label">Score</div><div class="value" id="scoreVal">0</div></div>
    </div>
    <div id="toast"></div>

    <div id="overlay">
      <h1>SHOAL</h1>
      <div class="sub" id="introText">
        Steer your glowing <b>leader fish</b>. A school flocks behind you.<br />
        Herd them into glowing <b>safe zones</b> to bank points —<br />
        but keep them clear of the <span class="warn">predators</span>.
      </div>
      <div id="finalLine"></div>
      <button id="startBtn">Dive in</button>
      <div class="hint" id="ctrlHint">Drag anywhere to steer</div>
    </div>

  </body>
</html>
