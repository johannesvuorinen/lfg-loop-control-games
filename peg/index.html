      }

        height: 100%;
        background: #0c0820;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        overflow: hidden;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }
      #app {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* Portrait playfield, centered, letterboxed. */
      #stage {

        height: 100%;

      canvas#game {
        display: block;
        width: 100%;

      }
