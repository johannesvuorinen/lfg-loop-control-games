<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo — Radial Demolition (three.js control)</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0d14; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }
      #hud {
        position: fixed;
        top: 16px;
        left: 16px;
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        font-size: 14px;
        line-height: 1.5;
        color: #e7ecf5;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.9);
        pointer-events: none;
        z-index: 10;
      }
      #hud .title { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; color: #ffd166; }
      #hud .stat { color: #9fb3d1; }
      #hud .val { color: #fff; font-weight: 600; }
      #banner {
        position: fixed;
        top: 38%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        font-size: 64px;
        font-weight: 800;
        letter-spacing: 4px;
        color: #6bff8a;
        text-shadow: 0 0 24px rgba(107, 255, 138, 0.7), 0 4px 12px rgba(0, 0, 0, 0.9);
        opacity: 0;
        transition: opacity 0.4s ease;
        pointer-events: none;
        z-index: 10;
      }
      #banner.show { opacity: 1; transform: translate(-50%, -50%); }
    </style>
    <script type="module" crossorigin src="./assets/index-CdL9z9p8.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <div class="title">DEMO — RADIAL DEMOLITION</div>
      <div><span class="stat">phase:</span> <span class="val" id="hud-phase">arming</span></div>
      <div><span class="stat">blasts:</span> <span class="val" id="hud-blasts">0</span></div>
      <div><span class="stat">toppled:</span> <span class="val" id="hud-toppled">0</span> / <span id="hud-total">0</span></div>
      <div><span class="stat">structure:</span> <span class="val" id="hud-status">standing</span></div>
    </div>
    <div id="banner">DEMOLISHED</div>
  </body>
</html>
