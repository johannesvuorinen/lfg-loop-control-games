<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ascent</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0d1a; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }

      /* ---- HUD ---- */
      #hud {
        position: fixed;
        top: 0; left: 0; right: 0;
        padding: 14px 20px;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        font-family: "Segoe UI", system-ui, sans-serif;
        color: #eaf2ff;
        pointer-events: none;
        text-shadow: 0 2px 6px rgba(0,0,0,0.6);
        z-index: 10;
      }
      #hud .stage-name { font-size: 22px; font-weight: 700; letter-spacing: 0.5px; }
      #hud .stage-sub  { font-size: 13px; opacity: 0.75; margin-top: 2px; }
      #hud .progress   { text-align: right; }
      #hud .progress .big { font-size: 26px; font-weight: 800; color: #7fd1ff; }
      #hud .progress .lbl { font-size: 12px; opacity: 0.7; letter-spacing: 1px; text-transform: uppercase; }

      /* ---- Center overlay (Stage Complete / You Win / Start) ---- */
      #overlay {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        font-family: "Segoe UI", system-ui, sans-serif;
        color: #fff; text-align: center;
        background: radial-gradient(circle at center, rgba(10,14,30,0.55), rgba(6,8,18,0.92));
        z-index: 20;
        transition: opacity 0.35s ease;
        backdrop-filter: blur(2px);
      }
      #overlay.hidden { opacity: 0; pointer-events: none; }
      #overlay h1 { font-size: 54px; font-weight: 800; letter-spacing: 1px;
        background: linear-gradient(180deg, #ffffff, #9fd6ff);
        -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 4px 16px rgba(80,160,255,0.35)); }
      #overlay p { font-size: 17px; opacity: 0.85; margin-top: 14px; max-width: 480px; line-height: 1.5; }
      #overlay .hint { margin-top: 30px; font-size: 14px; opacity: 0.7; letter-spacing: 0.5px;
        padding: 10px 22px; border: 1px solid rgba(255,255,255,0.25); border-radius: 999px;
        animation: pulse 1.6s ease-in-out infinite; }
      @keyframes pulse { 0%,100% { opacity: 0.55; } 50% { opacity: 1; } }

      #controls-tip {
        position: fixed; bottom: 16px; left: 0; right: 0;
        text-align: center; font-family: system-ui, sans-serif;
        font-size: 13px; color: #9fb0cc; pointer-events: none; z-index: 10;
        text-shadow: 0 2px 4px rgba(0,0,0,0.5);
      }
    </style>
    <script type="module" crossorigin src="./assets/index-BmQwqqW1.js"></script>
  </head>
  <body>
    <div id="app"></div>

    <div id="hud">
      <div class="stage-info">
        <div class="stage-name" id="hud-stage-name">Stage 1</div>
        <div class="stage-sub"  id="hud-stage-sub">Reach the goal</div>
      </div>
      <div class="progress">
        <div class="big" id="hud-progress">0 / 0</div>
        <div class="lbl">Orbs</div>
      </div>
    </div>

    <div id="controls-tip">WASD / Arrow keys to move</div>

    <div id="overlay">
      <h1 id="overlay-title">ASCENT</h1>
      <p id="overlay-text">Collect every glowing orb, then reach the goal pad to ascend. Three stages await.</p>
      <div class="hint" id="overlay-hint">Press SPACE or click to begin</div>
    </div>

  </body>
</html>
