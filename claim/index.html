<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claim — territory capture</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; background: #0b0c12; overflow: hidden;
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; color: #e6e9f2; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }

      #hud {
        position: fixed; top: 16px; left: 16px; z-index: 10;
        background: rgba(14, 16, 26, 0.78); border: 1px solid #2c3145;
        border-radius: 12px; padding: 14px 18px; min-width: 220px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.5); backdrop-filter: blur(6px);
      }
      #hud .title { font-size: 15px; font-weight: 700; letter-spacing: 2px;
        color: #40c4ff; margin-bottom: 10px; }
      #hud .row { display: flex; justify-content: space-between; align-items: baseline;
        margin: 4px 0; font-size: 13px; color: #9aa3bd; }
      #hud .row b { color: #fff; font-size: 18px; }
      #lives { color: #ff4d6d; font-size: 16px; letter-spacing: 2px; }
      .bar { margin-top: 10px; height: 8px; border-radius: 5px; background: #20243a; overflow: hidden; }
      #barfill { height: 100%; width: 0%;
        background: linear-gradient(90deg, #40c4ff, #7c5cff); transition: width 0.15s ease; }
      .goal { font-size: 11px; color: #707895; margin-top: 6px; }

      #help { position: fixed; bottom: 14px; left: 16px; z-index: 10;
        font-size: 12px; color: #6c7493; }

      #banner { position: fixed; inset: 0; display: none; z-index: 20;
        align-items: center; justify-content: center; pointer-events: none;
        font-size: 42px; font-weight: 800; letter-spacing: 1px; text-align: center; }
      #banner.show { display: flex; }
      #banner.win { color: #40ffb0; text-shadow: 0 0 30px rgba(64,255,176,0.5); }
      #banner.lose { color: #ff5d7a; text-shadow: 0 0 30px rgba(255,93,122,0.45); }
    </style>
    <script type="module" crossorigin src="./assets/index-vKxCPXUi.js"></script>
  </head>
  <body>
    <div id="app"></div>

    <div id="hud">
      <div class="title">◆ CLAIM</div>
      <div class="row"><span>Captured</span><b id="pct">0.0%</b></div>
      <div class="row"><span>Lives</span><span id="lives">♥♥♥</span></div>
      <div class="bar"><div id="barfill"></div></div>
      <div class="goal">Goal: capture 50% of the board</div>
    </div>

    <div id="help">WASD / arrows to move · leave territory to draw a trail · return to capture · avoid rovers · R to restart</div>
    <div id="banner"></div>

  </body>
</html>
