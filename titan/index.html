<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0612" />
  <title>TITAN — Boss Duel</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230a0612'/%3E%3Cpolygon points='16,5 27,26 5,26' fill='none' stroke='%2358e6c8' stroke-width='2.5'/%3E%3C/svg%3E" />
  <script type="module" crossorigin src="./assets/index-CuRhbpgo.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-DmutohVe.css">
</head>
<body>
  <div id="app">
    <canvas id="scene"></canvas>

    <!-- HUD -->
    <div id="hud" class="hidden">
      <div id="boss-bar-wrap">
        <div id="boss-name">⟁ THE TITAN</div>
        <div id="boss-bar-track">
          <div id="boss-bar-fill"></div>
          <div class="boss-bar-notch" style="left:66%"></div>
          <div class="boss-bar-notch" style="left:33%"></div>
        </div>
        <div id="phase-tag">PHASE I · DORMANT</div>
      </div>

      <div id="player-status">
        <div id="hp-label">VITALITY</div>
        <div id="hp-pips"></div>
      </div>
    </div>

    <!-- Overlay (menu / win / lose) -->
    <div id="overlay">
      <div id="overlay-card">
        <h1 id="title">TITAN</h1>
        <p id="subtitle">A duel against something that should not wake.</p>
        <div id="result" class="hidden"></div>
        <button id="start-btn">ENTER THE ARENA</button>
        <ul id="howto">
          <li><b>Drag</b> anywhere to move</li>
          <li>You fire <b>automatically</b> — keep the Titan in front of you</li>
          <li><b>Dodge</b> the bursts and the sweeping beam</li>
          <li>It <b>enrages</b> at 66% and 33% — the music will tell you</li>
        </ul>
      </div>
    </div>

    <div id="audio-note" class="hidden">♪ adaptive score on</div>
  </div>

</body>
</html>
