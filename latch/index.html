<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Latch — bone-attachment melee arena</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0e16; }
      #app { width: 100vw; height: 100vh; position: relative; }
      canvas { display: block; }

      #hud {
        position: absolute; top: 0; left: 0; right: 0;
        padding: 14px 18px;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        color: #e8eefc; pointer-events: none;
        display: flex; justify-content: space-between; align-items: flex-start;
        text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      }
      #title { font-size: 22px; font-weight: 700; letter-spacing: 0.5px; }
      #title small { display:block; font-size: 11px; font-weight: 400; opacity: 0.65; letter-spacing: 0; margin-top: 2px; }
      #score {
        font-size: 26px; font-weight: 800; text-align: right;
        color: #ffd34d;
      }
      #score small { display:block; font-size: 12px; font-weight: 500; color:#9fb0d0; }

      #hint {
        position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
        font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px;
        color: #aebbd6; background: rgba(12,16,26,0.55); padding: 7px 16px;
        border-radius: 20px; pointer-events: none; white-space: nowrap;
        border: 1px solid rgba(255,255,255,0.08);
      }

      #win {
        position: absolute; inset: 0; display: none;
        align-items: center; justify-content: center; flex-direction: column;
        background: rgba(8,10,18,0.78); backdrop-filter: blur(3px);
        font-family: 'Segoe UI', system-ui, sans-serif; color: #fff; pointer-events: none;
      }
      #win.show { display: flex; }
      #win .big { font-size: 56px; font-weight: 900; color: #6effa8; letter-spacing: 2px; }
      #win .sub { font-size: 16px; margin-top: 8px; color: #cdd8ee; }
    </style>
    <script type="module" crossorigin src="./assets/index-BeY9SpAL.js"></script>
  </head>
  <body>
    <div id="app">
      <div id="hud">
        <div id="title">LATCH<small>bone-attached sword · melee arena</small></div>
        <div id="score"><span id="score-val">0</span><small>HITS &middot; win at <span id="score-max">8</span></small></div>
      </div>
      <div id="hint">Move mouse to aim &middot; <b>Click / Space</b> to swing</div>
      <div id="win"><div class="big">VICTORY</div><div class="sub">All targets struck. Refresh to play again.</div></div>
    </div>
  </body>
</html>
