<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rapids — three.js</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0b1d2a; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }

      #hud {
        position: fixed;
        top: 14px;
        left: 14px;
        font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
        color: #eaf6ff;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
        font-size: 15px;
        line-height: 1.55;
        pointer-events: none;
        user-select: none;
      }
      #hud .big { font-size: 22px; font-weight: 700; letter-spacing: 0.5px; }
      #hud .lbl { color: #8fc6e8; }
      #hud .val { color: #ffffff; font-weight: 600; }
      #hud .sub { color: #b9d9ee; font-size: 12px; margin-top: 6px; }

      #banner {
        position: fixed;
        top: 38%;
        left: 0;
        right: 0;
        text-align: center;
        font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
        color: #fff;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.9);
        pointer-events: none;
        user-select: none;
        opacity: 0;
        transition: opacity 0.25s ease;
      }
      #banner .t1 { font-size: 46px; font-weight: 800; letter-spacing: 1px; }
      #banner .t2 { font-size: 18px; margin-top: 8px; color: #cfeaff; }
      #banner.show { opacity: 1; }
    </style>
    <script type="module" crossorigin src="./assets/index-Cz8Hsgdh.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <div class="big">RAPIDS</div>
      <div><span class="lbl">Gates</span> <span class="val" id="gates">0 / 0</span></div>
      <div><span class="lbl">Time </span> <span class="val" id="time">0.0s</span></div>
      <div><span class="lbl">Speed</span> <span class="val" id="speed">0.0</span> <span class="lbl">m/s</span></div>
      <div class="sub">A / D or ← / →  steer &nbsp;·&nbsp; W boost &nbsp;·&nbsp; R restart</div>
    </div>
    <div id="banner"><div class="t1" id="bannerT1"></div><div class="t2" id="bannerT2"></div></div>
  </body>
</html>
