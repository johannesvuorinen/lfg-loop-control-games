<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arc — an artillery lob game</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0b1020; }
      #app { width: 100vw; height: 100vh; display: block; }
      canvas { display: block; }

      /* ---- HUD ---- */
      #hud {
        position: fixed;
        top: 16px;
        left: 16px;
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        color: #e8eefc;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
        user-select: none;
        pointer-events: none;
      }
      #hud .title {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 2px;
        color: #ffd479;
      }
      #hud .stat { font-size: 14px; margin-top: 6px; line-height: 1.5; }
      #hud .stat b { color: #7fd1ff; }
      #score {
        position: fixed;
        top: 16px;
        right: 20px;
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        color: #e8eefc;
        text-align: right;
        user-select: none;
        pointer-events: none;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
      }
      #score .big { font-size: 40px; font-weight: 700; color: #aef7c0; }
      #score .label { font-size: 12px; letter-spacing: 2px; color: #8fa3c8; }

      #help {
        position: fixed;
        bottom: 14px;
        left: 50%;
        transform: translateX(-50%);
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        font-size: 13px;
        color: #b9c6e3;
        background: rgba(10, 16, 32, 0.55);
        border: 1px solid rgba(127, 209, 255, 0.18);
        padding: 8px 16px;
        border-radius: 999px;
        user-select: none;
        pointer-events: none;
        text-align: center;
      }
      #help b { color: #ffd479; }
    </style>
    <script type="module" crossorigin src="./assets/index-C-hDx-iG.js"></script>
  </head>
  <body>
    <canvas id="app"></canvas>

    <div id="hud">
      <div class="title">ARC</div>
      <div class="stat">
        Angle&nbsp;&nbsp;<b><span id="ui-angle">45</span>&deg;</b><br />
        Power&nbsp;&nbsp;<b><span id="ui-power">18</span></b><br />
        Yaw&nbsp;&nbsp;&nbsp;&nbsp;<b><span id="ui-yaw">0</span>&deg;</b>
      </div>
    </div>

    <div id="score">
      <div class="big"><span id="ui-score">0</span></div>
      <div class="label">SCORE &middot; <span id="ui-hits">0</span>/<span id="ui-targets">0</span> HIT</div>
    </div>

    <div id="help">
      <b>&larr; &rarr;</b> aim yaw &nbsp;&middot;&nbsp; <b>&uarr; &darr;</b> angle &nbsp;&middot;&nbsp;
      <b>A / D</b> power &nbsp;&middot;&nbsp; <b>SPACE</b> fire
    </div>

  </body>
</html>
