<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><circle cx='8' cy='8' r='3' fill='%23ffd27a'/></svg>" />
    <title>Bloom — fireworks night sky</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #05060f; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; touch-action: none; }

      /* ---- HUD ---- */
      #hud {
        position: fixed; inset: 0; pointer-events: none;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        color: #fff; user-select: none; -webkit-user-select: none;
      }
      .topbar {
        position: absolute; top: 0; left: 0; right: 0;
        display: flex; justify-content: space-between; align-items: flex-start;
        padding: 16px 18px;
      }
      .score-wrap { display: flex; flex-direction: column; gap: 2px; }
      .score-label {
        font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
        opacity: 0.55; font-weight: 600;
      }
      .score-val {
        font-size: 34px; font-weight: 800; line-height: 1;
        text-shadow: 0 0 18px rgba(120,170,255,0.55);
        font-variant-numeric: tabular-nums;
      }
      .combo {
        align-self: flex-end; text-align: right;
        font-weight: 800; font-size: 26px;
        transition: transform 0.12s ease, opacity 0.25s ease;
        text-shadow: 0 0 16px currentColor;
        opacity: 0; transform: scale(0.7);
      }
      .combo.show { opacity: 1; }
      .combo small { display: block; font-size: 11px; letter-spacing: 0.16em; opacity: 0.7; font-weight: 600; }

      /* shell-type selector */
      .shellbtn {
        pointer-events: auto;
        position: absolute; left: 50%; bottom: 22px; transform: translateX(-50%);
        display: flex; gap: 8px; background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.12); border-radius: 999px;
        padding: 6px; backdrop-filter: blur(8px);
      }
      .shellbtn button {
        pointer-events: auto; cursor: pointer;
        border: 0; border-radius: 999px; padding: 8px 14px;
        font-size: 13px; font-weight: 700; letter-spacing: 0.02em;
        color: #cfd6ff; background: transparent; transition: all 0.15s ease;
        font-family: inherit;
      }
      .shellbtn button.active { color: #05060f; background: #a9c2ff; box-shadow: 0 0 18px rgba(150,180,255,0.6); }

      .hint {
        position: absolute; left: 50%; top: 54%; transform: translate(-50%,-50%);
        text-align: center; font-size: 15px; opacity: 0.0; letter-spacing: 0.03em;
        transition: opacity 0.6s ease; font-weight: 600; text-shadow: 0 0 14px rgba(0,0,0,0.6);
      }
      .hint.show { opacity: 0.85; }
    </style>
    <script type="module" crossorigin src="./assets/index-CmkUq3xs.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <div class="topbar">
        <div class="score-wrap">
          <div class="score-label">Score</div>
          <div class="score-val" id="score">0</div>
        </div>
        <div class="combo" id="combo"><small>combo</small><span id="combo-x">x1</span></div>
      </div>
      <div class="hint" id="hint">tap the sky to launch</div>
      <div class="shellbtn" id="shellbtn">
        <button data-type="peony">Peony</button>
        <button data-type="willow">Willow</button>
        <button data-type="crackle">Crackle</button>
      </div>
    </div>
  </body>
</html>
