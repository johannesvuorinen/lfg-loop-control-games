<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pocket — 8-Ball Billiards</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0b1416; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }

      #hud {
        position: fixed;
        top: 14px; left: 14px;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        color: #eaf6f2;
        font-size: 15px;
        line-height: 1.5;
        text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        pointer-events: none;
        user-select: none;
        z-index: 10;
      }
      #hud .row { display: flex; gap: 8px; align-items: baseline; }
      #hud b { color: #ffe08a; font-weight: 700; }
      #hud .hint { margin-top: 8px; font-size: 12px; color: #9fc; opacity: 0.75; }

      /* Power meter */
      #power-wrap {
        position: fixed;
        bottom: 22px; left: 50%; transform: translateX(-50%);
        width: 320px; height: 18px;
        border: 2px solid rgba(255,255,255,0.35);
        border-radius: 10px;
        background: rgba(0,0,0,0.45);
        overflow: hidden;
        z-index: 10;
        opacity: 0.25;
        transition: opacity 0.15s;
        pointer-events: none;
      }
      #power-wrap.active { opacity: 1; }
      #power-fill {
        height: 100%; width: 0%;
        background: linear-gradient(90deg, #36d399, #ffe08a 55%, #ff5d5d);
        transition: width 0.04s linear;
      }

      #banner {
        position: fixed; inset: 0;
        display: none;
        align-items: center; justify-content: center;
        flex-direction: column;
        background: rgba(4,10,12,0.72);
        font-family: ui-monospace, Menlo, monospace;
        color: #fff; z-index: 20;
        text-align: center;
      }
      #banner.show { display: flex; }
      #banner h1 { font-size: 58px; letter-spacing: 4px; color: #ffe08a; }
      #banner p { margin-top: 10px; font-size: 16px; opacity: 0.85; }
      #banner button {
        margin-top: 26px; padding: 12px 30px; font-size: 16px;
        font-family: inherit; cursor: pointer; pointer-events: auto;
        background: #36d399; color: #06251a; border: none; border-radius: 8px;
        font-weight: 700; letter-spacing: 1px;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-DK82diTK.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <div class="row">BALLS&nbsp; <b id="hud-balls">7</b></div>
      <div class="row">SHOTS&nbsp; <b id="hud-shots">0</b></div>
      <div class="row" id="hud-status-row">STATE&nbsp; <b id="hud-status">READY</b></div>
      <div class="hint">drag from cue ball to aim · hold &amp; release to strike</div>
    </div>
    <div id="power-wrap"><div id="power-fill"></div></div>
    <div id="banner"><h1 id="banner-title">WIN</h1><p id="banner-sub"></p><button id="banner-btn">RACK 'EM AGAIN</button></div>
  </body>
</html>
