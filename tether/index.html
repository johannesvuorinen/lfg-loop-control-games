<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tether — grappling-hook swing</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0e1a; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }

      #hud {
        position: fixed;
        top: 16px; left: 16px;
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        color: #e8eefc;
        text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        pointer-events: none;
        user-select: none;
        font-size: 14px;
        line-height: 1.6;
      }
      #hud .title { font-size: 20px; font-weight: 700; letter-spacing: 0.5px; color: #7fd4ff; }
      #hud .row { margin-top: 2px; }
      #hud .state { font-weight: 700; }
      #hud .state.swing { color: #6effa3; }
      #hud .state.fall  { color: #ffd166; }
      #hud .state.ground{ color: #c0c8d8; }
      #hud .key { color: #7fd4ff; font-weight: 700; }

      #banner {
        position: fixed;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        text-align: center;
        color: #fff;
        text-shadow: 0 2px 12px rgba(0,0,0,0.9);
        pointer-events: none;
        user-select: none;
        opacity: 0;
        transition: opacity 0.25s ease;
      }
      #banner.show { opacity: 1; }
      #banner .big { font-size: 52px; font-weight: 800; letter-spacing: 1px; }
      #banner.win .big { color: #6effa3; }
      #banner.fall .big { color: #ff6b6b; }
      #banner .sub { font-size: 16px; margin-top: 6px; color: #cfd8ea; }

      #help {
        position: fixed;
        bottom: 16px; left: 50%;
        transform: translateX(-50%);
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        color: #aab4c8;
        font-size: 13px;
        text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        pointer-events: none;
        user-select: none;
        text-align: center;
      }
      #help .key { color: #7fd4ff; font-weight: 700; }
    </style>
    <script type="module" crossorigin src="./assets/index-Dr7yt-b1.js"></script>
  </head>
  <body>
    <div id="app"></div>

    <div id="hud">
      <div class="title">TETHER</div>
      <div class="row">Objective: <span id="objective">reach the goal →</span></div>
      <div class="row">State: <span id="state" class="state ground">GROUNDED</span></div>
      <div class="row">Anchor: <span id="anchor">—</span></div>
      <div class="row">Best X: <span id="progress">0.0</span> m</div>
    </div>

    <div id="banner"><div class="big"></div><div class="sub"></div></div>

    <div id="help">
      <span class="key">A / D</span> move &nbsp;·&nbsp;
      <span class="key">Mouse</span> aim &nbsp;·&nbsp;
      <span class="key">Click / Space</span> fire grapple &nbsp;·&nbsp;
      release to fling &nbsp;·&nbsp;
      <span class="key">R</span> respawn
    </div>

  </body>
</html>
