<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Treble — 501 Darts</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0b0d12;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        color: #e8eef7;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      canvas {
        display: block;
      }

      /* HUD overlay (three.js has no UI layer — this is plain DOM). */
      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 18px;
      }
      .panel {
        background: rgba(14, 18, 26, 0.72);
        border: 1px solid rgba(120, 150, 200, 0.25);
        border-radius: 12px;
        padding: 12px 16px;
        backdrop-filter: blur(6px);
      }
      #top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
      }
      #score {
        font-size: 15px;
        min-width: 180px;
      }
      #remaining {
        font-size: 54px;
        font-weight: 800;
        line-height: 1;
        color: #ffd24a;
        letter-spacing: 1px;
      }
      #remaining small {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: #9fb2cc;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 4px;
      }
      #turn {
        text-align: right;
        font-size: 14px;
        min-width: 200px;
      }
      #turn .darts {
        display: flex;
        gap: 6px;
        justify-content: flex-end;
        margin-top: 8px;
      }
      .dart-chip {
        font-size: 13px;
        font-weight: 700;
        padding: 4px 8px;
        border-radius: 8px;
        background: rgba(70, 120, 200, 0.28);
        border: 1px solid rgba(120, 160, 220, 0.4);
        min-width: 34px;
        text-align: center;
      }
      .dart-chip.pending {
        opacity: 0.35;
        font-weight: 500;
      }
      .dart-chip.bust {
        background: rgba(200, 60, 60, 0.32);
        border-color: rgba(230, 90, 90, 0.5);
      }
      #hint {
        color: #7ee0a4;
        font-weight: 700;
        font-size: 15px;
        margin-top: 6px;
      }
      #bottom {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        gap: 16px;
      }
      #status {
        font-size: 14px;
        color: #cdd8e8;
        min-height: 20px;
      }
      #controls {
        display: flex;
        gap: 10px;
        pointer-events: auto;
      }
      button {
        pointer-events: auto;
        font: inherit;
        font-weight: 700;
        color: #0b0d12;
        background: #ffd24a;
        border: none;
        border-radius: 10px;
        padding: 10px 16px;
        cursor: pointer;
      }
      button.secondary {
        color: #e8eef7;
        background: rgba(90, 120, 170, 0.3);
        border: 1px solid rgba(120, 160, 220, 0.4);
      }
      button:active {
        transform: translateY(1px);
      }
      #hint-line {
        font-size: 12px;
        color: #8ea4c2;
        text-align: center;
        padding-bottom: 4px;
      }

      /* Win banner */
      #banner {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        z-index: 20;
      }
      #banner.show {
        display: flex;
      }
      #banner .card {
        pointer-events: auto;
        text-align: center;
        background: rgba(12, 16, 24, 0.92);
        border: 2px solid #ffd24a;
        border-radius: 18px;
        padding: 36px 54px;
        box-shadow: 0 0 60px rgba(255, 210, 74, 0.35);
      }
      #banner h1 {
        margin: 0 0 6px;
        font-size: 46px;
        color: #ffd24a;
        letter-spacing: 2px;
      }
      #banner p {
        margin: 0 0 18px;
        color: #cdd8e8;
        font-size: 16px;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-V9attxnT.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <div id="top">
        <div class="panel" id="score">
          <div><b>TREBLE</b> · 501</div>
          <div id="darts-count">Darts thrown: 0</div>
          <div id="hint"></div>
        </div>
        <div class="panel" id="remaining-wrap">
          <div id="remaining"><small>Remaining</small><span id="remaining-val">501</span></div>
        </div>
        <div class="panel" id="turn">
          <div>This turn</div>
          <div class="darts" id="turn-darts"></div>
        </div>
      </div>
      <div>
        <div id="hint-line">Click the board to throw · aim with the mouse</div>
        <div id="bottom">
          <div class="panel" id="status">Aim and throw. Finish exactly on a double.</div>
          <div id="controls">
            <button class="secondary" id="btn-endturn">Next turn</button>
            <button id="btn-reset">New leg</button>
          </div>
        </div>
      </div>
    </div>
    <div id="banner">
      <div class="card">
        <h1>GAME SHOT!</h1>
        <p id="banner-sub">Checked out on a double.</p>
        <button id="btn-again">Play again</button>
      </div>
    </div>
  </body>
</html>
